e_range()]\n    } else {\n        \u0026source_code[node.byte_range()][..47]\n    };\n    \n    println!(\"{}{}[{}]: '{}'\", \n             indent, \n             node.kind(), \n             node.byte_range().len(),\n             node_text.replace('\\n', \"\\\\n\"));\n\n    for i in 0..node.child_count() {\n        if let Some(child) = node.child(i) {\n            print_ast_structure(\u0026child, source_code, depth + 1);\n        }\n    }\n}\n\n#[cfg(test)]\nmod debug_tests {\n    use super::*;\n\n    #[test]\n    fn debug_basic_query_execution() {\n        // 基本的なクエリ実行をデバッグ\n        let mut parser = Parser::new();\n        let language = language_javascript();\n        parser.set_language(language).expect(\"Failed to set language\");\n\n        let source_code = r\"\n        const message = t('hello.world');\n        const greeting = i18n.t('greeting.message', { name: 'User' });\n        \";\n\n        let tree = parser.parse(source_code, None).expect(\"Failed to parse code\");\n        \n        // クエリを直接実行\n        let queries = TranslationQueries::new(language).expect(\"Failed to create queries\");\n        let mut executor = QueryExecutor::new();\n\n        let references = executor\n            .execute_query(queries.i18next_trans_f_call(), \u0026tree, source_code)\n            .expect(\"Failed to execute query\");\n\n        println!(\"Debug: Found {} references\", references.len());\n        for (i, ref_item) in references.iter().enumerate() {\n            println!(\"Reference {}: key='{}', function='{}', captures={:?}\", \n                    i, ref_item.key, ref_item.function_name, ref_item.captures);\n        }\n\n        // ASTの構造を確認\n        let root = tree.root_node();\n        print_ast_structure(\u0026root, source_code, 0);\n    }\n\n    #[test]\n    fn debug_analyze_file_function() {\n        // analyze_file関数の動作をデバッグ\n        let file_manager = FileIdManager::new();\n        let file_path = PathBuf::from(\"test.js\");\n        let file_id = file_manager.get_or_create_file_id(file_path.clone());\n        \n        let source_code = r\"\n        const message = t('hello.world');\n        const greeting = i18n.t('greeting.message');\n        \";\n        \n        println!(\"Debug: Analyzing simple JavaScript code\");\n        let result = analyze_file(file_id, \u0026file_path, source_code)\n            .expect(\"Failed to analyze file\");\n        \n        println!(\"Debug: Analysis result:\");\n        println!(\"  - File ID: {:?}\", result.file_id);\n        println!(\"  - References count: {}\", result.references.len());\n        println!(\"  - Scopes count: {}\", result.scopes.len());\n        println!(\"  - Errors count: {}\", result.errors.len());\n        \n        for error in \u0026result.errors {\n            println!(\"  - Error: {error}\");\n        }\n        \n        for (i, reference) in result.references.iter().enumerate() {\n            println!(\"  - Reference {}: key='{}', function='{}', line={}, column={}\", \n                    i, reference.key, reference.function_name, reference.line, reference.column);\n        }\n        \n        for (i, scope) in result.scopes.iter().enumerate() {\n            println!(\"  - Scope {}: lines {}-{}, functions={:?}\", \n                    i, scope.start_line, scope.end_line, scope.imported_functions);\n        }\n    }\n\n    #[test]\n    fn debug_fixture_file_analysis() {\n        // フィクスチャファイルの解析をデバッグ\n        let file_manager = FileIdManager::new();\n        let file_path = get_fixture_path(\"javascript/basic_i18next.js\");\n        let file_id = file_manager.get_or_create_file_id(file_path.clone());\n        \n        let source_code = read_fixture_file(\"javascript/basic_i18next.js\")\n            .expect(\"Failed to read basic_i18next.js\");\n        \n        println!(\"Debug: Source code length: {} characters\", source_code.len());\n        println!(\"Debug: First 200 characters: {}\", \u0026source_code[..source_code.len().min(200)]);\n        \n        let result = analyze_file(file_id, \u0026file_path, \u0026source_code)\n            .expect(\"Failed to analyze basic_i18next.js\");\n        \n        println!(\"Debug: Analysis result for basic_i18next.js:\");\n        println!(\"  - References count: {}\", result.references.len());\n        println!(\"  - Scopes count: {}\", result.scopes.len());\n        println!(\"  - Errors count: {}\", result.errors.len());\n        \n        for error in \u0026result.errors {\n            println!(\"  - Error: {error}\");\n        }\n        \n        println!(\"Debug: All found references:\");\n        for (i, reference) in result.references.iter().enumerate() {\n            println!(\"  - Reference {}: key='{}', function='{}', line={}, column={}\", \n                    i, reference.key, reference.function_name, reference.line, reference.column);\n        }\n    }\n\n    #[test]\n    fn debug_raw_query_on_fixture() {\n        // フィクスチャファイルに対する生のクエリ実行をデバッグ\n        let mut parser = Parser::new();\n        let language = language_javascript();\n        parser.set_language(language).expect(\"Failed to set language\");\n\n        let source_code = read_fixture_file(\"javascript/basic_i18next.js\")\n            .expect(\"Failed to read basic_i18next.js\");\n\n        let tree = parser.parse(\u0026source_code, None).expect(\"Failed to parse code\");\n        \n        // クエリを直接実行\n        let queries = TranslationQueries::new(language).expect(\"Failed to create queries\");\n        let mut executor = QueryExecutor::new();\n\n        println!(\"Debug: Executing i18next_trans_f_call query\");\n        let call_references = executor\n            .execute_query(queries.i18next_trans_f_call(), \u0026tree, \u0026source_code)\n            .expect(\"Failed to execute call query\");\n\n        println!(\"Debug: Found {} call references\", call_references.len());\n        for (i, ref_item) in call_references.iter().enumerate() {\n            println!(\"Call Reference {}: key='{}', function='{}', captures={:?}\", \n                    i, ref_item.key, ref_item.function_name, ref_item.captures);\n        }\n\n        println!(\"Debug: Executing i18next_trans_f query\");\n        let hook_references = executor\n            .execute_query(queries.i18next_trans_f(), \u0026tree, \u0026source_code)\n            .expect(\"Failed to execute hook query\");\n\n        println!(\"Debug: Found {} hook references\", hook_references.len());\n        for (i, ref_item) in hook_references.iter().enumerate() {\n            println!(\"Hook Reference {}: key='{}', function='{}', captures={:?}\", \n                    i, ref_item.key, ref_item.function_name, ref_item.captures);\n        }\n\n        println!(\"Debug: Executing import_statements query\");\n        let import_references = executor\n            .execute_query(queries.import_statements(), \u0026tree, \u0026source_code)\n            .expect(\"Failed to execute import query\");\n\n        println!(\"Debug: Found {} import references\", import_references.len());\n        for (i, ref_item) in import_references.iter().enumerate() {\n            println!(\"Import Reference {}: key='{}', function='{}', captures={:?}\", \n                    i, ref_item.key, ref_item.function_name, ref_item.captures);\n        }\n    }\n\n    #[test]\n    fn debug_typescript_vs_javascript() {\n        // TypeScriptとJavaScriptパーサーの違いを確認\n        use js_i18n_language_server::query::language_typescript;\n        \n        let source_code = r\"\n        import { useTranslation } from 'react-i18next';\n        const { t } = useTranslation();\n        const message = t('test.key');\n        \";\n\n        // JavaScript パーサー\n        let mut js_parser = Parser::new();\n        let js_language = language_javascript();\n        js_parser.set_language(js_language).expect(\"Failed to set JS language\");\n        let js_tree = js_parser.parse(source_code, None).expect(\"Failed to parse with JS\");\n\n        // TypeScript パーサー\n        let mut ts_parser = Parser::new();\n        let ts_language = language_typescript();\n        ts_parser.set_language(ts_language).expect(\"Failed to set TS language\");\n        let ts_tree = ts_parser.parse(source_code, None).expect(\"Failed to parse with TS\");\n\n        println!(\"Debug: JavaScript parser root: {}\", js_tree.root_node().kind());\n        println!(\"Debug: TypeScript parser root: {}\", ts_tree.root_node().kind());\n\n        // クエリ実行の比較\n        let js_queries = TranslationQueries::new(js_language).expect(\"Failed to create JS queries\");\n        let ts_queries = TranslationQueries::new(ts_language).expect(\"Failed to create TS queries\");\n\n        let mut executor = QueryExecutor::new();\n\n        let js_refs = executor\n            .execute_query(js_queries.i18next_trans_f_call(), \u0026js_tree, source_code)\n            .expect(\"Failed to execute JS query\");\n\n        let ts_refs = executor\n            .execute_query(ts_queries.i18next_trans_f_call(), \u0026ts_tree, source_code)\n            .expect(\"Failed to execute TS query\");\n\n        println!(\"Debug: JavaScript parser found {} references\", js_refs.len());\n        println!(\"Debug: TypeScript parser found {} references\", ts_refs.len());\n\n        for (i, ref_item) in js_refs.iter().enumerate() {\n            println!(\"JS Reference {}: key='{}', function='{}'\", \n                    i, ref_item.key, ref_item.function_name);\n        }\n\n        for (i, ref_item) in ts_refs.iter().enumerate() {\n            println!(\"TS Reference {}: key='{}', function='{}'\", \n                    i, ref_item.key, ref_item.function_name);\n        }\n    }\n}","traces":[],"covered":0,"coverable":0},{"path":["/","Users","kohei_watanabe","ghq","github.com","nabekou29","js-i18n-language-server","tests","integration_tests.rs"],"content":"//! 統合テストスイート\n//!\n//! JavaScript/TypeScript向けi18n Language Serverの包括的な統合テストを提供します。\n//! 実際のファイルを使用して、解析エンジンの動作を検証し、パフォーマンステストも実施します。\n//!\n//! # テスト項目\n//!\n//! 1. Real-world JavaScript/TypeScriptファイルの統合テスト\n//! 2. React Hooksパターンのテスト\n//! 3. JSXコンポーネントのテスト\n//! 4. 複雑なネストスコープのテスト\n//! 5. エラーケースのテスト\n//! 6. パフォーマンステスト\n//! 7. 複数ライブラリの混在テスト\n//! 8. エッジケーステスト\n//!\n//! # 作成者\n//! @nabekou29\n\nuse js_i18n_language_server::{\n    analyzer::{analyze_file, FileIdManager},\n    types::{AnalysisError, FileType, TranslationReference},\n};\nuse std::{\n    fs,\n    path::PathBuf,\n    time::{Duration, Instant},\n};\n\n/// テスト用のファイルパスを取得するヘルパー関数\n///\n/// # 引数\n///\n/// * `relative_path` - testsディレクトリからの相対パス\n///\n/// # 戻り値\n///\n/// 絶対パス\nfn get_fixture_path(relative_path: \u0026str) -\u003e PathBuf {\n    let mut path = PathBuf::from(env!(\"CARGO_MANIFEST_DIR\"));\n    path.push(\"tests\");\n    path.push(\"fixtures\");\n    path.push(relative_path);\n    path\n}\n\n/// テストファイルの内容を読み込むヘルパー関数\n///\n/// # 引数\n///\n/// * `relative_path` - testsディレクトリからの相対パス\n///\n/// # 戻り値\n///\n/// ファイル内容\n///\n/// # エラー\n///\n/// ファイルの読み込みに失敗した場合\nfn read_fixture_file(relative_path: \u0026str) -\u003e Result\u003cString, std::io::Error\u003e {\n    let path = get_fixture_path(relative_path);\n    fs::read_to_string(path)\n}\n\n/// 期待される翻訳参照の検証ヘルパー\n///\n/// # 引数\n///\n/// * `references` - 実際の翻訳参照\n/// * `expected_keys` - 期待される翻訳キーのリスト\nfn assert_contains_keys(references: \u0026[TranslationReference], expected_keys: \u0026[\u0026str]) {\n    let found_keys: Vec\u003c\u0026str\u003e = references.iter().map(|r| r.key.as_str()).collect();\n    \n    for expected_key in expected_keys {\n        assert!(\n            found_keys.contains(expected_key),\n            \"Expected key '{expected_key}' not found. Found keys: {found_keys:?}\"\n        );\n    }\n}\n\n/// 期待されない翻訳参照の検証ヘルパー\n///\n/// # 引数\n///\n/// * `references` - 実際の翻訳参照\n/// * `unexpected_keys` - 期待されない翻訳キーのリスト\nfn assert_not_contains_keys(references: \u0026[TranslationReference], unexpected_keys: \u0026[\u0026str]) {\n    let found_keys: Vec\u003c\u0026str\u003e = references.iter().map(|r| r.key.as_str()).collect();\n    \n    for unexpected_key in unexpected_keys {\n        assert!(\n            !found_keys.contains(unexpected_key),\n            \"Unexpected key '{unexpected_key}' found. All found keys: {found_keys:?}\"\n        );\n    }\n}\n\n#[cfg(test)]\nmod integration_tests {\n    use super::*;\n\n    #[test]\n    fn test_basic_i18next_integration() {\n        let file_manager = FileIdManager::new();\n        let file_path = get_fixture_path(\"javascript/basic_i18next.js\");\n        let file_id = file_manager.get_or_create_file_id(file_path.clone());\n        \n        let source_code = read_fixture_file(\"javascript/basic_i18next.js\")\n            .expect(\"Failed to read basic_i18next.js\");\n        \n        let result = analyze_file(file_id, \u0026file_path, \u0026source_code)\n            .expect(\"Failed to analyze basic_i18next.js\");\n        \n        // 無効なキー（空文字列、undefined）に対するエラーは期待される\n        if result.has_errors() {\n            // エラーがある場合、それらが無効なキーに関するものかを確認\n            for error in \u0026result.errors {\n                match error {\n                    AnalysisError::InvalidTranslationKey { key, reason, .. } =\u003e {\n                        // 空のキーまたはundefinedキーのエラーは期待される\n                        assert!(\n                            key.trim().is_empty() || key == \"undefined\",\n                            \"Unexpected invalid key error: {key} - {reason}\"\n                        );\n                    }\n                    _ =\u003e {\n                        panic!(\"Unexpected error type: {error:?}\");\n                    }\n                }\n            }\n        }\n        \n        // 期待される翻訳キーが見つかることを確認\n        let expected_keys = [\n            \"hello.world\",\n            \"greeting.message\",\n            \"short.message\",\n            \"nested.deeply.buried.key\",\n            \"condition.true\",\n            \"condition.false\",\n            \"function.message\",\n            \"object.title\",\n            \"object.description\",\n            \"array.first\",\n            \"array.second\",\n            \"array.third\",\n        ];\n        \n        assert_contains_keys(\u0026result.references, \u0026expected_keys);\n        \n        // コメントや文字列内のキーは検出されないことを確認\n        let unexpected_keys = [\n            \"comment.key\",\n            \"block.comment.key\",\n            \"string.key\",\n        ];\n        \n        assert_not_contains_keys(\u0026result.references, \u0026unexpected_keys);\n        \n        // 動的キーは部分的に検出される可能性がある\n        // テンプレートリテラルの検出をチェック\n        let dynamic_found = result.references.iter()\n            .any(|r| r.key.contains(\"profile\") || r.function_name == \"t\");\n        assert!(dynamic_found, \"Dynamic key patterns should be detected\");\n    }\n\n    #[test]\n    fn test_react_hooks_integration() {\n        let file_manager = FileIdManager::new();\n        let file_path = get_fixture_path(\"javascript/react_hooks.js\");\n        let file_id = file_manager.get_or_create_file_id(file_path.clone());\n        \n        let source_code = read_fixture_file(\"javascript/react_hooks.js\")\n            .expect(\"Failed to read react_hooks.js\");\n        \n        let result = analyze_file(file_id, \u0026file_path, \u0026source_code)\n            .expect(\"Failed to analyze react_hooks.js\");\n        \n        // エラーがないことを確認\n        assert!(!result.has_errors(), \"Analysis should not have errors: {:?}\", result.errors);\n        \n        // useTranslationフックからのスコープが作成されることを確認\n        assert!(!result.scopes.is_empty(), \"Should have scope information\");\n        \n        // 期待される翻訳キーが見つかることを確認\n        let expected_keys = [\n            \"component.title\",\n            \"component.description\",\n            \"panel.title\",\n            \"panel.button.save\",\n            \"panel.button.cancel\",\n            \"name\", // keyPrefix適用後: user:profile.name\n            \"email\", // keyPrefix適用後: user:profile.email\n            \"phone\", // keyPrefix適用後: user:profile.phone\n            \"app.title\",\n            \"validation.required\",\n            \"title\",\n            \"confirm.delete\",\n            \"success.deleted\",\n            \"button.delete\",\n            \"welcome\",\n            \"description\",\n            \"success\",\n            \"error\",\n            \"warning\",\n        ];\n        \n        // すべてのキーが完全に一致する必要はないが、一部は見つかるはず\n        let found_count = expected_keys.iter()\n            .filter(|\u0026key| result.references.iter().any(|r| r.key.contains(key)))\n            .count();\n        \n        assert!(found_count \u003e 5, \"Should find at least 5 translation keys, found {found_count}\");\n    }\n\n    #[test]\n    fn test_jsx_trans_component_integration() {\n        let file_manager = FileIdManager::new();\n        let file_path = get_fixture_path(\"jsx/trans_component.jsx\");\n        let file_id = file_manager.get_or_create_file_id(file_path.clone());\n        \n        let source_code = read_fixture_file(\"jsx/trans_component.jsx\")\n            .expect(\"Failed to read trans_component.jsx\");\n        \n        let result = analyze_file(file_id, \u0026file_path, \u0026source_code)\n            .expect(\"Failed to analyze trans_component.jsx\");\n        \n        // 注意: JSXの解析はJavaScriptパーサーでは制限される可能性がある\n        // エラーの有無をチェック（パーサーエラーは許容される）\n        if result.has_errors() {\n            // JSXパーシングエラーは許容される\n            println!(\"JSX parsing had errors (expected with JavaScript parser): {:?}\", result.errors);\n        } else {\n            // 期待されるTransコンポーネントのキー\n            let expected_keys = [\n                \"basic.trans\",\n                \"self.closing\",\n                \"complex.trans\",\n                \"nested.parent\",\n                \"nested.child\",\n                \"auth.logged_in\",\n                \"auth.logged_out\",\n                \"list.item\",\n                \"function.rendered\",\n            ];\n            \n            // いくつかのキーが見つかることを確認\n            let found_count = expected_keys.iter()\n                .filter(|\u0026key| result.references.iter().any(|r| r.key == *key))\n                .count();\n            \n            if found_count \u003e 0 {\n                println!(\"Found {found_count} Trans component keys\");\n            }\n        }\n    }\n\n    #[test]\n    fn test_complex_scopes_integration() {\n        let file_manager = FileIdManager::new();\n        let file_path = get_fixture_path(\"typescript/complex_scopes.ts\");\n        let file_id = file_manager.get_or_create_file_id(file_path.clone());\n        \n        let source_code = read_fixture_file(\"typescript/complex_scopes.ts\")\n            .expect(\"Failed to read complex_scopes.ts\");\n        \n        let result = analyze_file(file_id, \u0026file_path, \u0026source_code)\n            .expect(\"Failed to analyze complex_scopes.ts\");\n        \n        // TypeScriptファイルの解析結果を確認\n        if result.has_errors() {\n            // TypeScriptの構文でJavaScript/TypeScriptパーサーが処理できない場合もある\n            println!(\"TypeScript parsing had some errors: {:?}\", result.errors);\n        }\n        \n        // 複雑なスコープパターンの検出\n        let expected_patterns = [\n            \"admin.welcome\",\n            \"user.welcome\",\n            \"format.nested\",\n            \"loading.user\",\n            \"user.not_found\",\n            \"validation.name_required\",\n            \"role.admin\",\n            \"role.user\",\n            \"role.invalid\",\n            \"generic.error\",\n            \"hoc.title\",\n            \"hoc.description\",\n            \"permissions\",\n            \"recursion.base_case\",\n            \"recursion.current\",\n            \"start\",\n            \"middle\",\n            \"end\",\n            \"user.name\",\n            \"user.email\",\n            \"admin.panel\",\n        ];\n        \n        // 複雑なパターンの一部が検出されることを確認\n        let detected_count = expected_patterns.iter()\n            .filter(|\u0026pattern| result.references.iter().any(|r| r.key.contains(pattern)))\n            .count();\n        \n        println!(\"Detected {} out of {} complex scope patterns\", detected_count, expected_patterns.len());\n        \n        // 最低限のパターンが検出されることを確認\n        assert!(detected_count \u003e 0, \"Should detect at least some complex scope patterns\");\n    }\n\n    #[test]\n    fn test_mixed_libraries_integration() {\n        let file_manager = FileIdManager::new();\n        let file_path = get_fixture_path(\"typescript/mixed_libraries.ts\");\n        let file_id = file_manager.get_or_create_file_id(file_path.clone());\n        \n        let source_code = read_fixture_file(\"typescript/mixed_libraries.ts\")\n            .expect(\"Failed to read mixed_libraries.ts\");\n        \n        let result = analyze_file(file_id, \u0026file_path, \u0026source_code)\n            .expect(\"Failed to analyze mixed_libraries.ts\");\n        \n        // 複数ライブラリの検出\n        let library_patterns = [\n            // i18next\n            \"i18next.message\",\n            \"i18next.greeting\",\n            // react-i18next\n            \"title\",\n            \"description\",\n            // next-intl\n            \"welcome\",\n            \"current_locale\",\n            // 混在パターン\n            \"mixed.react\",\n            \"mixed.next\",\n            \"mixed.i18next\",\n            \"basic\",\n            \"admin\",\n            \"panel\",\n            \"message\",\n            \"direct.access\",\n        ];\n        \n        let detected_libraries = library_patterns.iter()\n            .filter(|\u0026pattern| result.references.iter().any(|r| r.key.contains(pattern)))\n            .count();\n        \n        println!(\"Detected {detected_libraries} mixed library patterns\");\n        \n        // 複数のライブラリパターンが検出されることを確認\n        assert!(detected_libraries \u003e 0, \"Should detect mixed library patterns\");\n    }\n\n    #[test]\n    fn test_edge_cases_integration() {\n        let file_manager = FileIdManager::new();\n        let file_path = get_fixture_path(\"edge_cases/dynamic_keys.js\");\n        let file_id = file_manager.get_or_create_file_id(file_path.clone());\n        \n        let source_code = read_fixture_file(\"edge_cases/dynamic_keys.js\")\n            .expect(\"Failed to read dynamic_keys.js\");\n        \n        let result = analyze_file(file_id, \u0026file_path, \u0026source_code)\n            .expect(\"Failed to analyze dynamic_keys.js\");\n        \n        // エッジケースの処理確認\n        let edge_case_patterns = [\n            \"user.\", // 動的キーの一部\n            \"profile.\",\n            \"status.\",\n            \"errors.\",\n            \"wizard.step.\",\n            \"theme.\",\n            \"greetings.\",\n            \"item.\",\n            \"deeply.nested.key.structure\",\n            \"real.translation\",\n            \"regex.real.key\",\n            \"async.error\",\n            \"generator.\",\n        ];\n        \n        let detected_edge_cases = edge_case_patterns.iter()\n            .filter(|\u0026pattern| result.references.iter().any(|r| r.key.contains(pattern)))\n            .count();\n        \n        println!(\"Detected {detected_edge_cases} edge case patterns\");\n        \n        // コメントや文字列内のキーは検出されないことを確認\n        let should_not_detect = [\n            \"commented.key\",\n            \"block.commented.key\",\n            \"todo.key\",\n            \"multiline.key\",\n            \"example.key\",\n            \"template.example\",\n            \"another.example\",\n            \"code.example\",\n            \"html.example\",\n        ];\n        \n        assert_not_contains_keys(\u0026result.references, \u0026should_not_detect);\n        \n        // 実際の翻訳呼び出しは検出されることを確認\n        assert_contains_keys(\u0026result.references, \u0026[\"valid.key\", \"real.translation\"]);\n    }\n\n    #[test]\n    fn test_performance_large_file() {\n        let file_manager = FileIdManager::new();\n     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      }
    };
  });

  return [
    ...folders,
    ...files.filter(file => file.path.length === 1),
  ];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener("hashchange", () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.substr(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(({current}) => {
      return {current: [...current, file.path[0]]};
    }, () => this.updateHash());
  }

  back(file) {
    this.setState(({current}) => {
      return {current: current.slice(0, current.length - 1)};
    }, () => this.updateHash());
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e('div', {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e('table', {className: 'files-list'},
      e('thead', {className: 'files-list__head'},
        e('tr', null,
          e('th', null, "Path"),
          e('th', null, "Coverage")
        )
      ),
      e('tbody', {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile}))
      )
    )
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? file.covered / file.coverable * 100 : -1;
  const coverageDelta = file.prevRun &&
    (file.covered / file.coverable * 100 - file.prevRun.covered / file.prevRun.coverable * 100);

  return e('tr', {
      className: 'files-list__file'
        + (coverage >= 0 && coverage < 50 ? ' files-list__file_low': '')
        + (coverage >= 50 && coverage < 80 ? ' files-list__file_medium': '')
        + (coverage >= 80 ? ' files-list__file_high': '')
        + (file.is_folder ? ' files-list__file_folder': ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e('td', null,
      file.covered + ' / ' + file.coverable +
      (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e('span', {title: 'Change from the previous run'},
        (coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : ''))
    )
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'},
    e(FileHeader, {file, onBack}),
    e(FileContent, {file})
  );
}

function FileHeader({file, onBack}) {
  const coverage = file.covered / file.coverable * 100;
  const coverageDelta = file.prevRun && (coverage - file.prevRun.covered / file.prevRun.coverable * 100);

  return e('div', {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e('div', {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable +
      (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e('span', {title: 'Change from the previous run'},
        (coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : ''))
    )
  );
}

function FileContent({file}) {
  return e('pre', {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      return e('code', {
          className: 'code-line'
            + (covered ? ' code-line_covered' : '')
            + (uncovered ? ' code-line_uncovered' : ''),
          title: trace ? JSON.stringify(trace.stats, null, 2) : null,
        }, line);
    })
  );
}

(function(){
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData && previousData.files.forEach((file) => {
    const path = file.path.slice(commonPath.length).join('/');
    prevFilesMap.set(path, file);
  });

  const files = data.files.map((file) => {
    const path = file.path.slice(commonPath.length);
    const { covered = 0, coverable = 0 } = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: { covered, coverable },
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    }
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));
}());
</script>
