,"stats":{"Line":1}},{"line":1487,"address":[],"length":0,"stats":{"Line":1}},{"line":1491,"address":[],"length":0,"stats":{"Line":981}}],"covered":235,"coverable":372},{"path":["/","Users","kohei_watanabe","ghq","github.com","nabekou29","js-i18n-language-server","src","lib.rs"],"content":"//! JavaScript/TypeScript向けi18n Language Serverのバックエンド実装\n//!\n//! このモジュールは、JavaScript/TypeScriptプロジェクト向けのi18n Language Serverの\n//! メインバックエンド実装を提供します。以下の主要機能を統合します：\n//!\n//! - `TranslationCache`: 翻訳リソースの高速キャッシュ管理\n//! - `FileIdManager`: メモリ効率的なファイルID管理\n//! - `I18nIndexer`: ワークスペース全体の翻訳キー管理\n//! - LSP機能: 補完、ホバー、診断、定義ジャンプ\n//!\n//! # アーキテクチャ\n//!\n//! ```text\n//! Backend\n//! ├── Client (LSP通信)\n//! ├── I18nIndexer (翻訳キー管理)\n//! │   ├── TranslationCache (翻訳データ)\n//! │   ├── FileIdManager (ファイル管理)\n//! │   └── AnalysisResults (解析結果)\n//! └── Workspace (プロジェクト管理)\n//! ```\n//!\n//! # 作成者\n//! @nabekou29\n//!\n//! # 作成日\n//! 2025-06-15\n//!\n//! # 更新日\n//! 2025-06-15 - Backend構造体の拡張実装\n\n/// i18n解析エンジン（メインモジュール）\npub mod analyzer;\n/// tree-sitterベースのi18n解析クエリシステム\npub mod query;\n/// 翻訳リソース管理システム\npub mod translation;\n/// i18n Language Server の型定義\npub mod types;\n\nuse std::path::PathBuf;\nuse std::sync::Arc;\n\nuse anyhow::Result as AnyhowResult;\nuse dashmap::DashMap;\nuse tokio::sync::RwLock;\nuse tower_lsp::jsonrpc::Result;\nuse tower_lsp::lsp_types::{\n    CompletionItem,\n    CompletionItemKind,\n    CompletionOptions,\n    CompletionParams,\n    CompletionResponse,\n    Diagnostic,\n    DiagnosticSeverity,\n    DidChangeTextDocumentParams,\n    DidOpenTextDocumentParams,\n    ExecuteCommandOptions,\n    Hover,\n    HoverContents,\n    HoverParams,\n    HoverProviderCapability,\n    InitializeParams,\n    InitializeResult,\n    InitializedParams,\n    MarkupContent,\n    MarkupKind,\n    MessageType,\n    OneOf,\n    Position,\n    Range,\n    ServerCapabilities,\n    TextDocumentSyncCapability,\n    TextDocumentSyncKind,\n    Url,\n    WorkDoneProgressOptions,\n    WorkspaceFoldersServerCapabilities,\n    WorkspaceServerCapabilities,\n};\nuse tower_lsp::{\n    Client,\n    LanguageServer,\n};\nuse tracing::{\n    debug,\n    error,\n    info,\n    warn,\n};\n\nuse crate::analyzer::{\n    FileIdManager,\n    analyze_file,\n};\nuse crate::translation::{\n    NamespacedKey,\n    TranslationCache,\n};\nuse crate::types::{\n    AnalysisResult,\n    ErrorSeverity,\n    FileId,\n    TranslationReference,\n};\n\n/// i18n Language Serverのバックエンド実装\n///\n/// JavaScript/TypeScriptコード内のi18n翻訳キーを解析し、\n/// LSP機能（補完、ホバー、診断等）を提供します。\n///\n/// 統合されたコンポーネント：\n/// - `I18nIndexer`: ワークスペース全体の翻訳キー管理\n/// - `TranslationCache`: 翻訳リソースのキャッシュ\n/// - `FileIdManager`: ファイルID管理\n#[derive(Debug)]\npub struct Backend {\n    /// LSPクライアントとの通信を担当\n    pub client: Client,\n    /// ワークスペース全体のi18n情報を管理するインデクサー\n    pub indexer: Arc\u003cI18nIndexer\u003e,\n}\n\n/// ワークスペース全体の翻訳キー管理システム\n///\n/// 全ファイルの解析結果を統合し、LSP機能に必要な情報を効率的に提供します。\n/// スレッドセーフな設計により、並行処理と増分更新に対応します。\n#[derive(Debug)]\npub struct I18nIndexer {\n    /// 翻訳リソースのキャッシュ管理\n    pub translation_cache: Arc\u003cTranslationCache\u003e,\n    /// ファイルID管理システム\n    pub file_id_manager: Arc\u003cFileIdManager\u003e,\n    /// ファイルごとの解析結果（FileId -\u003e `AnalysisResult`）\n    pub analysis_results: Arc\u003cDashMap\u003cFileId, AnalysisResult\u003e\u003e,\n    /// URL -\u003e `FileId` のマッピング\n    pub url_to_file_id: Arc\u003cDashMap\u003cString, FileId\u003e\u003e,\n    /// ワークスペースルートパス\n    pub workspace_root: Arc\u003cRwLock\u003cOption\u003cPathBuf\u003e\u003e\u003e,\n}\n\nimpl I18nIndexer {\n    /// `新しいI18nIndexerを作成します`\n    ///\n    /// # 戻り値\n    ///\n    /// `初期化されたI18nIndexer`\n    #[must_use]\n    pub fn new() -\u003e Self {\n        Self {\n            translation_cache: Arc::new(TranslationCache::new()),\n            file_id_manager: Arc::new(FileIdManager::new()),\n            analysis_results: Arc::new(DashMap::new()),\n            url_to_file_id: Arc::new(DashMap::new()),\n            workspace_root: Arc::new(RwLock::new(None)),\n        }\n    }\n\n    /// ワークスペースを初期化します\n    ///\n    /// # 引数\n    ///\n    /// * `workspace_root` - ワークスペースのルートパス\n    ///\n    /// # 戻り値\n    ///\n    /// 初期化結果（見つかった翻訳ファイル数）\n    ///\n    /// # エラー\n    ///\n    /// ワークスペースのスキャンに失敗した場合\n    pub async fn initialize_workspace(\u0026self, workspace_root: PathBuf) -\u003e AnyhowResult\u003cusize\u003e {\n        info!(\"Initializing workspace: {}\", workspace_root.display());\n\n        // ワークスペースルートを設定\n        {\n            let mut root = self.workspace_root.write().await;\n            *root = Some(workspace_root.clone());\n        }\n\n        // 翻訳ファイルの自動検出とロード\n        let mut total_files = 0;\n\n        // 一般的な翻訳ファイルディレクトリを検索\n        let translation_dirs = [\n            workspace_root.join(\"locales\"),\n            workspace_root.join(\"public/locales\"),\n            workspace_root.join(\"src/locales\"),\n            workspace_root.join(\"i18n\"),\n            workspace_root.join(\"translations\"),\n            workspace_root.join(\"lang\"),\n        ];\n\n        for dir in \u0026translation_dirs {\n            if dir.exists() \u0026\u0026 dir.is_dir() {\n                match self.translation_cache.load_directory(dir).await {\n                    Ok(count) =\u003e {\n                        total_files += count;\n                        info!(\"Loaded {} translation files from {}\", count, dir.display());\n                    }\n                    Err(e) =\u003e {\n                        warn!(\"Failed to load translations from {}: {}\", dir.display(), e);\n                    }\n                }\n            }\n        }\n\n        // ファイル監視を開始\n        for dir in \u0026translation_dirs {\n            if dir.exists() \u0026\u0026 dir.is_dir() {\n                if let Err(e) = self.translation_cache.start_watching(dir.clone()).await {\n                    warn!(\"Failed to start watching {}: {}\", dir.display(), e);\n                }\n            }\n        }\n\n        info!(\"Workspace initialization completed. Total translation files: {}\", total_files);\n        Ok(total_files)\n    }\n\n    /// ファイルを解析してインデックスに追加します\n    ///\n    /// # 引数\n    ///\n    /// * `uri` - ファイルのURI\n    /// * `content` - ファイルの内容\n    ///\n    /// # 戻り値\n    ///\n    /// 解析結果\n    ///\n    /// # エラー\n    ///\n    /// 解析に失敗した場合\n    pub async fn analyze_and_index_file(\n        \u0026self,\n        uri: \u0026str,\n        content: \u0026str,\n    ) -\u003e AnyhowResult\u003cAnalysisResult\u003e {\n        let parsed_url = Url::parse(uri)?;\n        let file_path = PathBuf::from(parsed_url.path());\n\n        // ファイルIDを取得または作成\n        let file_id = self.file_id_manager.get_or_create_file_id(file_path.clone());\n\n        // URI -\u003e FileId のマッピングを保存\n        self.url_to_file_id.insert(uri.to_string(), file_id);\n\n        // ファイルを解析\n        let analysis_result = analyze_file(file_id, \u0026file_path, content)?;\n\n        // 解析結果をインデックスに保存\n        self.analysis_results.insert(file_id, analysis_result.clone());\n\n        debug!(\n            \"Analyzed file: {} (FileId: {}), References: {}, Errors: {}\",\n            file_path.display(),\n            file_id.as_u32(),\n            analysis_result.references.len(),\n            analysis_result.errors.len()\n        );\n\n        Ok(analysis_result)\n    }\n\n    /// 指定された位置で翻訳キーを検索します\n    ///\n    /// # 引数\n    ///\n    /// * `uri` - ファイルのURI\n    /// * `line` - 行番号（0ベース）\n    /// * `column` - 列番号（0ベース）\n    ///\n    /// # 戻り値\n    ///\n    /// 見つかった翻訳参照\n    #[must_use]\n    pub fn find_translation_at_position(\n        \u0026self,\n        uri: \u0026str,\n        line: u32,\n        column: u32,\n    ) -\u003e Option\u003cTranslationReference\u003e {\n        let file_id = self.url_to_file_id.get(uri)?;\n        let analysis_result = self.analysis_results.get(\u0026file_id)?;\n\n        // 指定された位置に一致する翻訳参照を検索\n        analysis_result\n            .references\n            .iter()\n            .find(|ref_| ref_.line == line \u0026\u0026 ref_.column \u003c= column)\n            .cloned()\n    }\n\n    /// 翻訳キーの補完候補を取得します\n    ///\n    /// # 引数\n    ///\n    /// * `prefix` - 入力されたプレフィックス\n    /// * `namespace` - 検索対象の名前空間\n    /// * `limit` - 結果の最大数\n    ///\n    /// # 戻り値\n    ///\n    /// 補完候補のリスト\n    #[must_use]\n    pub fn get_completion_items(\n        \u0026self,\n        prefix: \u0026str,\n        namespace: Option\u003c\u0026str\u003e,\n        limit: usize,\n    ) -\u003e Vec\u003cCompletionItem\u003e {\n        let keys = self.translation_cache.search_keys_with_prefix(namespace, prefix, limit);\n\n        keys.into_iter()\n            .map(|key| CompletionItem {\n                label: key.clone(),\n                kind: Some(CompletionItemKind::CONSTANT),\n                detail: Some(format!(\n                    \"Translation key{}\",\n                    namespace.map_or(String::new(), |ns| format!(\" (namespace: {ns})\"))\n                )),\n                documentation: self.get_translation_content(\u0026key, namespace),\n                ..Default::default()\n            })\n            .collect()\n    }\n\n    /// 翻訳キーの内容を取得します\n    ///\n    /// # 引数\n    ///\n    /// * `key` - 翻訳キー\n    /// * `namespace` - 名前空間\n    ///\n    /// # 戻り値\n    ///\n    /// 翻訳内容（MarkupContent形式）\n    fn get_translation_content(\n        \u0026self,\n        key: \u0026str,\n        namespace: Option\u003c\u0026str\u003e,\n    ) -\u003e Option\u003ctower_lsp::lsp_types::Documentation\u003e {\n        let namespaced_key = NamespacedKey::new(namespace.map(String::from), key.to_string());\n\n        let value = self.translation_cache.get_translation(\u0026namespaced_key)?;\n        let content = value.as_string()?;\n\n        Some(tower_lsp::lsp_types::Documentation::MarkupContent(MarkupContent {\n            kind: MarkupKind::Markdown,\n            value: format!(\"**Translation:**\\n\\n```\\n{content}\\n```\"),\n        }))\n    }\n\n    /// 診断を生成します\n    ///\n    /// # 引数\n    ///\n    /// * `uri` - ファイルのURI\n    /// * `result` - 解析結果\n    ///\n    /// # 戻り値\n    ///\n    /// 診断のベクター\n    #[must_use]\n    pub fn generate_diagnostics(\u0026self, uri: \u0026str, result: \u0026AnalysisResult) -\u003e Vec\u003cDiagnostic\u003e {\n        let mut diagnostics = Vec::new();\n\n        // 解析エラーを診断に変換\n        for error in \u0026result.errors {\n            let severity = match error.severity() {\n                ErrorSeverity::Error =\u003e DiagnosticSeverity::ERROR,\n                ErrorSeverity::Warning =\u003e DiagnosticSeverity::WARNING,\n                ErrorSeverity::Info =\u003e DiagnosticSeverity::INFORMATION,\n                ErrorSeverity::Fatal =\u003e DiagnosticSeverity::ERROR,\n            };\n\n            let diagnostic = Diagnostic {\n                range: Range {\n                    start: Position {\n                        line: error.position().map_or(0, |p| p.line.saturating_sub(1)),\n                        character: error.position().map_or(0, |p| p.column.saturating_sub(1)),\n                    },\n                    end: Position {\n                        line: error.position().map_or(0, |p| p.line.saturating_sub(1)),\n                        character: error.position().map_or(0, |p| p.column + 10), // 仮の終了位置\n                    },\n                },\n                severity: Some(severity),\n                code: None,\n                code_description: None,\n                source: Some(\"js-i18n-language-server\".to_string()),\n                message: error.to_string(),\n                related_information: None,\n                tags: None,\n                data: None,\n            };\n\n            diagnostics.push(diagnostic);\n        }\n\n        // 未定義の翻訳キーをチェック\n        for reference in \u0026result.references {\n            let namespaced_key = NamespacedKey::new(\n                reference.namespace.clone(),\n                reference.key.clone(),\n            );\n\n            if self.translation_cache.get_translation(\u0026namespaced_key).is_none() {\n                let diagnostic = Diagnostic {\n                    range: Range {\n                        start: Position {\n                            line: reference.line,\n                            character: reference.column,\n                        },\n                        end: Position {\n                            line: reference.line,\n                            character: reference.column + reference.key.len() as u32,\n                        },\n                    },\n                    severity: Some(DiagnosticSeverity::ERROR),\n                    code: Some(tower_lsp::lsp_types::NumberOrString::String(\"missing-translation\".to_string())),\n                    code_description: None,\n                    source: Some(\"js-i18n-language-server\".to_string()),\n                    message: format!(\"Translation key '{}' not found\", reference.key),\n                    related_information: None,\n                    tags: None,\n                    data: None,\n                };\n\n                diagnostics.push(diagnostic);\n            }\n        }\n\n        debug!(\n            \"Generated {} diagnostics for {} (analysis errors: {}, missing translations: {})\",\n            diagnostics.len(),\n            uri,\n            result.errors.len(),\n            diagnostics.len() - result.errors.len()\n        );\n\n        diagnostics\n    }\n\n    /// 統計情報を取得します\n    ///\n    /// # 戻り値\n    ///\n    /// インデクサーの統計情報\n    #[must_use]\n    pub fn get_stats(\u0026self) -\u003e I18nIndexerStats {\n        let cache_stats = self.translation_cache.get_stats();\n        let total_references =\n            self.analysis_results.iter().map(|entry| entry.references.len()).sum();\n\n        I18nIndexerStats {\n            total_files: self.file_id_manager.file_count(),\n            total_references,\n            total_translation_keys: cache_stats.total_keys,\n            namespaces: cache_stats.namespace_count,\n            translation_files: cache_stats.file_count,\n        }\n    }\n\n    /// インデクサーをクリアします\n    pub fn clear(\u0026self) {\n        self.analysis_results.clear();\n        self.url_to_file_id.clear();\n        self.translation_cache.clear();\n        info!(\"I18n indexer cleared\");\n    }\n}\n\nimpl Default for I18nIndexer {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\n/// `I18nIndexerの統計情報`\n#[derive(Debug, Clone, Copy)]\npub struct I18nIndexerStats {\n    /// 管理されているファイル数\n    pub total_files: usize,\n    /// 総翻訳参照数\n    pub total_references: usize,\n    /// 総翻訳キー数\n    pub total_translation_keys: usize,\n    /// 名前空間数\n    pub namespaces: usize,\n    /// 翻訳ファイル数\n    pub translation_files: usize,\n}\n\nimpl Backend {\n    /// 新しいBackendインスタンスを作成します\n    ///\n    /// # 引数\n    ///\n    /// * `client` - LSPクライアント\n    ///\n    /// # 戻り値\n    ///\n    /// 初期化されたBackend\n    #[must_use]\n    pub fn new(client: Client) -\u003e Self {\n        Self { client, indexer: Arc::new(I18nIndexer::new()) }\n    }\n\n    /// URIからLSP `Position型をtypes::Position型に変換します`\n    ///\n    /// # 引数\n    ///\n    /// * `position` - LSP Position\n    ///\n    /// # 戻り値\n    ///\n    /// 内部のPosition型\n    #[must_use]\n    const fn lsp_position_to_internal(position: \u0026Position) -\u003e types::Position {\n        types::Position::new(\n            position.line + 1, // LSPは0ベース、内部は1ベース\n            position.character + 1,\n            0, // バイトオフセットは計算が必要だが、ここでは簡略化\n        )\n    }\n}\n\n#[tower_lsp::async_trait]\nimpl LanguageServer for Backend {\n    async fn initialize(\u0026self, params: InitializeParams) -\u003e Result\u003cInitializeResult\u003e {\n        info!(\"Language server initializing...\");\n\n        // ワークスペースの初期化\n        if let Some(workspace_folders) = params.workspace_folders {\n            for folder in workspace_folders {\n                let workspace_path = PathBuf::from(folder.uri.path());\n                match self.indexer.initialize_workspace(workspace_path.clone()).await {\n                    Ok(file_count) =\u003e {\n                        self.client\n                            .log_message(\n                                MessageType::INFO,\n                                format!(\n                                    \"Initialized workspace: {} ({} translation files)\",\n                                    workspace_path.display(),\n                                    file_count\n                                ),\n                            )\n                            .await;\n                    }\n                    Err(e) =\u003e {\n                        error!(\n                            \"Failed to initialize workspace {}: {}\",\n                            workspace_path.display(),\n                            e\n                        );\n                        self.client\n                            .log_message(\n                                MessageType::ERROR,\n                                format!(\n                                    \"Failed to initialize workspace {}: {}\",\n                                    workspace_path.display(),\n                                    e\n                                ),\n                            )\n                            .await;\n                    }\n                }\n            }\n        } else if let Some(root_uri) = params.root_uri {\n            // Fallback to root_uri if workspace_folders is not provided\n            let workspace_path = PathBuf::from(root_uri.path());\n            match self.indexer.initialize_workspace(workspace_path.clone()).await {\n                Ok(file_count) =\u003e {\n                    self.client\n                        .log_message(\n                            MessageType::INFO,\n                            format!(\n                                \"Initialized workspace: {} ({} translation files)\",\n                                workspace_path.display(),\n                                file_count\n                            ),\n                        )\n                        .await;\n                }\n                Err(e) =\u003e {\n                    error!(\"Failed to initialize workspace {}: {}\", workspace_path.display(), e);\n                }\n            }\n        }\n\n        Ok(InitializeResult {\n            server_info: Some(tower_lsp::lsp_types::ServerInfo {\n                name: \"js-i18n-language-server\".to_string(),\n                version: Some(env!(\"CARGO_PKG_VERSION\").to_string()),\n            }),\n            capabilities: ServerCapabilities {\n                text_document_sync: Some(TextDocumentSyncCapability::Kind(\n                    TextDocumentSyncKind::INCREMENTAL,\n                )),\n                hover_provider: Some(HoverProviderCapability::Simple(true)),\n                completion_provider: Some(CompletionOptions {\n                    resolve_provider: Some(false),\n                    trigger_characters: Some(vec![\n                        \"'\".to_string(),\n                        \"\\\"\".to_string(),\n                        \".\".to_string(),\n                    ]),\n                    work_done_progress_options: WorkDoneProgressOptions::default(),\n                    all_commit_characters: None,\n                    completion_item: None,\n                }),\n                execute_command_provider: Some(ExecuteCommandOptions {\n                    commands: vec![\"i18n.show_stats\".to_string(), \"i18n.clear_cache\".to_string()],\n                    work_done_progress_options: WorkDoneProgressOptions::default(),\n                }),\n                workspace: Some(WorkspaceServerCapabilities {\n                    workspace_folders: Some(WorkspaceFoldersServerCapabilities {\n                        supported: Some(true),\n                        change_notifications: Some(OneOf::Left(true)),\n                    }),\n                    file_operations: None,\n                }),\n                ..ServerCapabilities::default()\n            },\n        })\n    }\n\n    async fn initialized(\u0026self, _: InitializedParams) {\n        let stats = self.indexer.get_stats();\n        self.client\n            .log_message(\n                MessageType::INFO,\n                format!(\n                    \"i18n Language Server initialized! Files: {}, References: {}, Translation keys: {}\",\n                    stats.total_files, stats.total_references, stats.total_translation_keys\n                ),\n            )\n            .await;\n    }\n\n    async fn shutdown(\u0026self) -\u003e Result\u003c()\u003e {\n        info!(\"Language server shutting down...\");\n        // ファイル監視を停止\n        self.indexer.translation_cache.stop_watching().await;\n        Ok(())\n    }\n\n    async fn did_open(\u0026self, params: DidOpenTextDocumentParams) {\n        let uri = params.text_document.uri.to_string();\n        let content = \u0026params.text_document.text;\n\n        // ファイルを解析してインデックスに追加\n        match self.indexer.analyze_and_index_file(\u0026uri, content).await {\n            Ok(result) =\u003e {\n                debug!(\n                    \"Analyzed opened file: {} (references: {}, errors: {})\",\n                    uri,\n                    result.references.len(),\n                    result.errors.len()\n                );\n\n                // 診断を送信\n                let diagnostics = self.indexer.generate_diagnostics(\u0026uri, \u0026result);\n                let parsed_uri = Url::parse(\u0026uri).expect(\"Invalid URI\");\n                self.client.publish_diagnostics(parsed_uri, diagnostics, None).await;\n            }\n            Err(e) =\u003e {\n                error!(\"Failed to analyze file {}: {}\", uri, e);\n            }\n        }\n    }\n\n    async fn did_change(\u0026self, params: DidChangeTextDocumentParams) {\n        let uri = params.text_document.uri.to_string();\n\n        // 増分更新の場合は最後の変更を使用（簡略化）\n        if let Some(change) = params.content_changes.into_iter().next_back() {\n            let text = change.text;\n            // ファイルを再解析\n            match self.indexer.analyze_and_index_file(\u0026uri, \u0026text).await {\n                Ok(result) =\u003e {\n                    debug!(\n                        \"Re-analyzed changed file: {} (references: {})\",\n                        uri,\n                        result.references.len()\n                    );\n                    \n                    // 診断を送信\n                    let diagnostics = self.indexer.generate_diagnostics(\u0026uri, \u0026result);\n                    let parsed_uri = Url::parse(\u0026uri).expect(\"Invalid URI\");\n                    self.client.publish_diagnostics(parsed_uri, diagnostics, None).await;\n                }\n                Err(e) =\u003e {\n                    error!(\"Failed to re-analyze file {}: {}\", uri, e);\n                }\n            }\n        }\n    }\n\n    async fn completion(\u0026self, params: CompletionParams) -\u003e Result\u003cOption\u003cCompletionResponse\u003e\u003e {\n        let uri = params.text_document_position.text_document.uri.to_string();\n        let position = params.text_document_position.position;\n\n        debug!(\"Completion requested for {} at {}:{}\", uri, position.line, position.character);\n\n        // 現在位置で翻訳キーが使用されているかチェック\n        if let Some(translation_ref) =\n            self.indexer.find_translation_at_position(\u0026uri, position.line, position.character)\n        {\n            // 翻訳キーの補完候補を取得\n            let completion_items = self.indexer.get_completion_items(\n                \u0026translation_ref.key,\n                translation_ref.namespace.as_deref(),\n                50, // 最大50件\n            );\n\n            if !completion_items.is_empty() {\n                debug!(\"Found {} completion items\", completion_items.len());\n                return Ok(Some(CompletionResponse::Array(completion_items)));\n            }\n        }\n\n        // 一般的な翻訳キーの補完（プレフィックスなし）\n        let completion_items = self.indexer.get_completion_items(\"\", None, 20);\n\n        if completion_items.is_empty() {\n            Ok(None)\n        } else {\n            debug!(\"Found {} general completion items\", completion_items.len());\n            Ok(Some(CompletionResponse::Array(completion_items)))\n        }\n    }\n\n    async fn hover(\u0026self, params: HoverParams) -\u003e Result\u003cOption\u003cHover\u003e\u003e {\n        let uri = params.text_document_position_params.text_document.uri.to_string();\n        let position = params.text_document_position_params.position;\n\n        debug!(\"Hover requested for {} at {}:{}\", uri, position.line, position.character);\n\n        // 現在位置で翻訳キーを検索\n        if let Some(translation_ref) =\n            self.indexer.find_translation_at_position(\u0026uri, position.line, position.character)\n        {\n            // 翻訳内容を取得\n            let namespaced_key =\n                NamespacedKey::new(translation_ref.namespace.clone(), translation_ref.key.clone());\n\n            if let Some(translation_value) =\n                self.indexer.translation_cache.get_translation(\u0026namespaced_key)\n            {\n                let content = if let Some(text) = translation_value.as_string() {\n                    format!(\n                        \"**Translation Key:** `{}`\\n\\n**Content:**\\n```\\n{}\\n```\\n\\n**Function:** `{}`{}\",\n                        translation_ref.key,\n                        text,\n                        translation_ref.function_name,\n                        translation_ref\n                            .namespace\n                            .as_ref()\n                            .map_or(String::new(), |ns| format!(\"\\n**Namespace:** `{ns}`\"))\n                    )\n                } else {\n                    format!(\n                        \"**Translation Key:** `{}`\\n\\n**Type:** Object\\n\\n**Available Keys:**\\n{}\\n\\n**Function:** `{}`{}\",\n                        translation_ref.key,\n                        translation_value.get_keys().join(\", \"),\n                        translation_ref.function_name,\n                        translation_ref\n                            .namespace\n                            .as_ref()\n                            .map_or(String::new(), |ns| format!(\"\\n**Namespace:** `{ns}`\"))\n                    )\n                };\n\n                return Ok(Some(Hover {\n                    contents: HoverContents::Markup(MarkupContent {\n                        kind: MarkupKind::Markdown,\n                        value: content,\n                    }),\n                    range: None,\n                }));\n            }\n\n            // 翻訳が見つからない場合\n            let content = format!(\n                \"**Translation Key:** `{}`\\n\\n⚠️ **Translation not found**\\n\\n**Function:** `{}`{}\",\n                translation_ref.key,\n                translation_ref.function_name,\n                translation_ref\n                    .namespace\n                    .as_ref()\n                    .map_or(String::new(), |ns| format!(\"\\n**Namespace:** `{ns}`\"))\n            );\n\n            return Ok(Some(Hover {\n                contents: HoverContents::Markup(MarkupContent {\n                    kind: MarkupKind::Markdown,\n                    value: content,\n                }),\n                range: None,\n            }));\n        }\n\n        Ok(None)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[tokio::test]\n    async fn test_backend_creation() {\n        let (_client, _) = tower_lsp::LspService::new(Backend::new);\n        // バックエンドが正常に作成されることを確認（ダミーアサーション削除）\n    }\n\n    #[tokio::test]\n    async fn test_i18n_indexer_creation() {\n        let indexer = I18nIndexer::new();\n        let stats = indexer.get_stats();\n\n        assert_eq!(stats.total_fil 0,"stats":{"Line":0}}],"covered":35,"coverable":237},{"path":["/","Users","kohei_watanabe","ghq","github.com","nabekou29","js-i18n-language-server","src","main.rs"],"content":"//! LSPサーバーのエントリーポイント\n//!\n//! このバイナリはLanguage Server Protocolを実装したサーバーを起動します。\n//! 標準入出力を通じてクライアントと通信します。\n\nuse js_i18n_language_server::Backend;\nuse tower_lsp::{\n    LspService,\n    Server,\n};\n\n#[tokio::main]\nasync fn main() {\n    tracing_subscriber::fmt().init();\n\n    let (stdin, stdout) = (tokio::io::stdin(), tokio::io::stdout());\n    let (service, socket) = LspService::new(Backend::new);\n    Server::new(stdin, stdout, socket).serve(service).await;\n}\n","traces":[{"line":13,"address":[],"length":0,"stats":{"Line":0}},{"line":14,"address":[],"length":0,"stats":{"Line":0}},{"line":16,"address":[],"length":0,"stats":{"Line":0}},{"line":17,"address":[],"length":0,"stats":{"Line":0}},{"line":18,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":5},{"path":["/","Users","kohei_watanabe","ghq","github.com","nabekou29","js-i18n-language-server","src","query.rs"],"content":"use std::collections::HashMap;\n\n/// tree-sitterベースのi18n解析クエリシステム\n///\n/// このモジュールは、JavaScript/TypeScriptコード内のi18n関数呼び出しを\n/// 正確に抽出するためのtree-sitterクエリを提供します。\n/// js-i18n.nvim で実証済みのクエリパターンを使用し、高精度な解析を実現します。\n///\n/// # 主要機能\n///\n/// - i18next/react-i18nextライブラリのサポート\n/// - next-intlライブラリのサポート  \n/// - JSXコンポーネントの解析\n/// - import文の解析\n/// - 純粋関数ベースの実装\n///\n/// # 設計原則\n///\n/// - 副作用のない純粋関数\n/// - Result型による適切なエラーハンドリング\n/// - js-i18n.nvimで実証済みのクエリパターン使用\n/// - 統一されたキャプチャ名（@i18n.*）の使用\nuse anyhow::Result;\nuse tree_sitter::{\n    Language,\n    Node,\n    Query,\n    QueryCursor,\n    QueryMatch,\n    Tree,\n};\n\n/// `JavaScript言語パーサーを取得`\n///\n/// # Returns\n///\n/// JavaScript用のtree-sitter言語パーサー\n#[must_use]\npub fn language_javascript() -\u003e Language {\n    tree_sitter_javascript::language()\n}\n\n/// `TypeScript言語パーサーを取得`\n///\n/// # Returns\n///\n/// TypeScript用のtree-sitter言語パーサー\n#[must_use]\npub fn language_typescript() -\u003e Language {\n    tree_sitter_typescript::language_typescript()\n}\n\n/// i18next/react-i18next向けの翻訳関数呼び出しクエリ\n///\n/// js-i18n.nvim の `I18NEXT_TRANS_F_CALL_QUERY` を基盤とし、\n/// `t('key')`, `i18n.t('key')` 等の呼び出しを検出します。\n///\n/// # キャプチャ名\n///\n/// - `@i18n.t_func_name`: 関数名（t, i18n.t 等）\n/// - `@i18n.key`: 翻訳キー文字列\n/// - `@i18n.key_arg`: キー引数全体\n/// - `@i18n.call_t`: 呼び出し全体\npub const I18NEXT_TRANS_F_CALL_QUERY: \u0026str = r\"\n; trans_f_call（翻訳関数呼び出し）の検出\n(call_expression\n  function: [\n    (identifier) @i18n.t_func_name\n    (member_expression\n      object: (identifier)\n      property: (property_identifier) @i18n.t_func_name\n    )\n  ]\n  arguments: (arguments\n    (string\n      (string_fragment) @i18n.key\n    ) @i18n.key_arg\n    .\n    (object)* @i18n.options\n  )\n) @i18n.call_t\n\n; テンプレートリテラルでの動的キー対応\n(call_expression\n  function: [\n    (identifier) @i18n.t_func_name\n    (member_expression\n      object: (identifier)\n      property: (property_identifier) @i18n.t_func_name\n    )\n  ]\n  arguments: (arguments\n    (template_string) @i18n.key_arg\n    .\n    (object)* @i18n.options\n  )\n) @i18n.call_t\n\";\n\n/// i18next/react-i18next向けの翻訳関数定義クエリ\n///\n/// js-i18n.nvim の `I18NEXT_TRANS_F_QUERY` を基盤とし、\n/// useTranslation()フックによるスコープ定義を検出します。\n///\n/// # キャプチャ名\n///\n/// - `@i18n.hook_name`: フック名（useTranslation）\n/// - `@i18n.namespace`: ネームスペース文字列\n/// - `@i18n.key_prefix`: キープレフィックス文字列\n/// - `@i18n.get_t`: 呼び出し全体\npub const I18NEXT_TRANS_F_QUERY: \u0026str = r#\"\n; trans_f（翻訳関数定義）useTranslation()フックの検出\n(call_expression\n  function: (identifier) @i18n.hook_name\n  (#eq? @i18n.hook_name \"useTranslation\")\n  arguments: (arguments\n    (string\n      (string_fragment) @i18n.namespace\n    ) @i18n.namespace_arg\n    ?\n    (object\n      (pair\n        key: (property_identifier) @i18n.keyPrefix_key\n        (#eq? @i18n.keyPrefix_key \"keyPrefix\")\n        value: (string\n          (string_fragment) @i18n.key_prefix\n        ) @i18n.key_prefix_arg\n      )*\n    ) @i18n.options\n    ?\n  )\n) @i18n.get_t\n\n; ネームスペースのみのuseTranslation\n(call_expression\n  function: (identifier) @i18n.hook_name  \n  (#eq? @i18n.hook_name \"useTranslation\")\n  arguments: (arguments\n    (string\n      (string_fragment) @i18n.namespace\n    ) @i18n.namespace_arg\n  )\n) @i18n.get_t\n\n; 引数なしのuseTranslation\n(call_expression\n  function: (identifier) @i18n.hook_name\n  (#eq? @i18n.hook_name \"useTranslation\")\n  arguments: (arguments)\n) @i18n.get_t\n\"#;\n\n/// React i18next向けのTransコンポーネントクエリ\n///\n/// js-i18n.nvim の `REACT_I18NEXT_TRANS_COMPONENT_QUERY` を基盤とし、\n/// `\u003cTrans i18nKey=\"key\" /\u003e` 等のJSXコンポーネントを検出します。\n///\n/// 注意: `このクエリはTypeScript` JSX文法でのみ利用可能です。\n/// `通常のJavaScript文法では` JSX ノードタイプが利用できません。\n///\n/// # キャプチャ名\n///\n/// - `@i18n.component_name`: コンポーネント名（Trans）\n/// - `@i18n.key`: i18nKey属性の値\n/// - `@i18n.trans_component`: コンポーネント全体\npub const REACT_I18NEXT_TRANS_COMPONENT_QUERY: \u0026str = r#\"\n; 自己終了Trans コンポーネント（TypeScript用）\n(jsx_self_closing_element\n  name: (identifier) @i18n.component_name\n  (#eq? @i18n.component_name \"Trans\")\n  attribute: (jsx_attribute\n    name: (property_identifier) @i18n.attr_name\n    (#eq? @i18n.attr_name \"i18nKey\")\n    value: (string\n      (string_fragment) @i18n.key  \n    ) @i18n.key_attr\n  )*\n) @i18n.trans_component\n\"#;\n\n/// import文検出クエリ\n///\n/// js-i18n.nvim の `IMPORT_STATEMENTS_QUERY` を基盤とし、\n/// i18n関連ライブラリのimport文を検出します。\n///\n/// # キャプチャ名\n///\n/// - `@i18n.import_source`: インポート元モジュール名\n/// - `@i18n.import_statement`: import文全体\npub const IMPORT_STATEMENTS_QUERY: \u0026str = r#\"\n; ES6 import文\n(import_statement\n  source: (string\n    (string_fragment) @i18n.import_source\n  )\n) @i18n.import_statement\n\n; require() での動的import\n(call_expression\n  function: (identifier) @i18n.require_func\n  (#eq? @i18n.require_func \"require\")\n  arguments: (arguments\n    (string\n      (string_fragment) @i18n.import_source\n    )\n  )\n) @i18n.require_statement\n\"#;\n\n/// 翻訳クエリ管理構造体\n///\n/// js-i18n.nvim で実証済みのクエリパターンを管理し、\n/// 各i18nライブラリに特化した解析を提供します。\n#[derive(Debug)]\npub struct TranslationQueries {\n    /// i18next/react-i18next: 翻訳関数呼び出し\n    i18next_trans_f_call: Query,\n    /// i18next/react-i18next: 翻訳関数定義\n    i18next_trans_f: Query,\n    /// react-i18next: Trans コンポーネント\n    react_i18next_trans_component: Query,\n    /// 共通: import文\n    import_statements: Query,\n}\n\nimpl TranslationQueries {\n    /// 新しいTranslationQueriesインスタンスを作成（JavaScript用）\n    ///\n    /// JSXクエリは含まれません。JSXが必要な場合は`new_with_jsx`を使用してください。\n    ///\n    /// # Arguments\n    ///\n    /// * `language` - 使用するtree-sitter言語パーサー\n    ///\n    /// # Returns\n    ///\n    /// クエリの作成に成功した場合は`Ok(TranslationQueries)`、\n    /// 失敗した場合は`Err`を返します。\n    ///\n    /// # Errors\n    ///\n    /// クエリの構文が不正な場合にエラーを返します。\n    pub fn new(language: Language) -\u003e Result\u003cSelf\u003e {\n        let i18next_trans_f_call = Query::new(language, I18NEXT_TRANS_F_CALL_QUERY)\n            .map_err(|e| anyhow::anyhow!(\"i18next trans_f_call query failed: {e}\"))?;\n\n        let i18next_trans_f = Query::new(language, I18NEXT_TRANS_F_QUERY)\n            .map_err(|e| anyhow::anyhow!(\"i18next trans_f query failed: {e}\"))?;\n\n        let import_statements = Query::new(language, IMPORT_STATEMENTS_QUERY)\n            .map_err(|e| anyhow::anyhow!(\"import statements query failed: {e}\"))?;\n\n        // JSXクエリは作成しない（JavaScriptパーサーでは利用不可能）\n        // ダミークエリとして簡単なクエリを作成\n        let react_i18next_trans_component = Query::new(language, \"(identifier) @dummy\")\n            .map_err(|e| anyhow::anyhow!(\"dummy query failed: {e}\"))?;\n\n        Ok(Self {\n            i18next_trans_f_call,\n            i18next_trans_f,\n            react_i18next_trans_component,\n            import_statements,\n        })\n    }\n\n    /// 新しいTranslationQueriesインスタンスを作成（JSX対応）\n    ///\n    /// # Arguments\n    ///\n    /// * `language` - 使用するtree-sitter言語パーサー（JSX対応）\n    ///\n    /// # Returns\n    ///\n    /// クエリの作成に成功した場合は`Ok(TranslationQueries)`、\n    /// 失敗した場合は`Err`を返します。\n    ///\n    /// # Errors\n    ///\n    /// クエリの構文が不正な場合にエラーを返します。\n    pub fn new_with_jsx(language: Language) -\u003e Result\u003cSelf\u003e {\n        let i18next_trans_f_call = Query::new(language, I18NEXT_TRANS_F_CALL_QUERY)\n            .map_err(|e| anyhow::anyhow!(\"i18next trans_f_call query failed: {e}\"))?;\n\n        let i18next_trans_f = Query::new(language, I18NEXT_TRANS_F_QUERY)\n            .map_err(|e| anyhow::anyhow!(\"i18next trans_f query failed: {e}\"))?;\n\n        let react_i18next_trans_component =\n            Query::new(language, REACT_I18NEXT_TRANS_COMPONENT_QUERY)\n                .map_err(|e| anyhow::anyhow!(\"react-i18next Trans component query failed: {e}\"))?;\n\n        let import_statements = Query::new(language, IMPORT_STATEMENTS_QUERY)\n            .map_err(|e| anyhow::anyhow!(\"import statements query failed: {e}\"))?;\n\n        Ok(Self {\n            i18next_trans_f_call,\n            i18next_trans_f,\n            react_i18next_trans_component,\n            import_statements,\n        })\n    }\n\n    /// i18next翻訳関数呼び出しクエリを取得\n    ///\n    /// # Returns\n    ///\n    /// i18next `trans_f_call` クエリへの参照\n    #[must_use]\n    pub const fn i18next_trans_f_call(\u0026self) -\u003e \u0026Query {\n        \u0026self.i18next_trans_f_call\n    }\n\n    /// i18next翻訳関数定義クエリを取得\n    ///\n    /// # Returns\n    ///\n    /// i18next `trans_f` クエリへの参照\n    #[must_use]\n    pub const fn i18next_trans_f(\u0026self) -\u003e \u0026Query {\n        \u0026self.i18next_trans_f\n    }\n\n    /// React i18next Transコンポーネントクエリを取得\n    ///\n    /// # Returns\n    ///\n    /// react-i18next Trans component クエリへの参照\n    #[must_use]\n    pub const fn react_i18next_trans_component(\u0026self) -\u003e \u0026Query {\n        \u0026self.react_i18next_trans_component\n    }\n\n    /// import文クエリを取得\n    ///\n    /// # Returns\n    ///\n    /// import statements クエリへの参照\n    #[must_use]\n    pub const fn import_statements(\u0026self) -\u003e \u0026Query {\n        \u0026self.import_statements\n    }\n}\n\n/// クエリ実行エンジン\n///\n/// 純粋関数ベースでtree-sitterクエリを実行し、\n/// 副作用のない解析処理を提供します。\npub struct QueryExecutor {\n    /// クエリカーソル（再利用可能）\n    cursor: QueryCursor,\n}\n\nimpl QueryExecutor {\n    /// `新しいQueryExecutorインスタンスを作成`\n    ///\n    /// # Returns\n    ///\n    /// `新しいQueryExecutorインスタンス`\n    #[must_use]\n    pub fn new() -\u003e Self {\n        Self { cursor: QueryCursor::new() }\n    }\n\n    /// クエリを実行して翻訳キー参照を抽出\n    ///\n    /// # Arguments\n    ///\n    /// * `query` - 実行するtree-sitterクエリ\n    /// * `tree` - 解析対象のASTツリー\n    /// * `source_code` - ソースコード文字列\n    ///\n    /// # Returns\n    ///\n    /// 抽出された翻訳キー参照のVec。エラーが発生した場合は`Err`を返します。\n    ///\n    /// # Errors\n    ///\n    /// tree-sitterクエリの実行でエラーが発生した場合\n    pub fn execute_query(\n        \u0026mut self,\n        query: \u0026Query,\n        tree: \u0026Tree,\n        source_code: \u0026str,\n    ) -\u003e Result\u003cVec\u003cQueryTranslationReference\u003e\u003e {\n        let mut references = Vec::new();\n        let matches = self.cursor.matches(query, tree.root_node(), source_code.as_bytes());\n\n        for query_match in matches {\n            let reference = Self::extract_translation_reference(\u0026query_match, source_code)?;\n            references.push(reference);\n        }\n\n        Ok(references)\n    }\n\n    /// `QueryMatchから翻訳参照を抽出`\n    ///\n    /// # Arguments\n    ///\n    /// * `query_match` - tree-sitterクエリマッチ\n    /// * `source_code` - ソースコード文字列\n    ///\n    /// # Returns\n    ///\n    /// 抽出された翻訳参照。エラーが発生した場合は`Err`を返します。\n    ///\n    /// # Errors\n    ///\n    /// ノードからテキストが抽出できない場合、またはUTF-8デコードに失敗した場合\n    fn extract_translation_reference(\n        query_match: \u0026QueryMatch\u003c'_, '_\u003e,\n        source_code: \u0026str,\n    ) -\u003e Result\u003cQueryTranslationReference\u003e {\n        let mut captures = HashMap::new();\n        let mut translation_key = String::new();\n        let mut function_name = String::new();\n\n        for capture in query_match.captures {\n            let node = capture.node;\n            let text = extract_node_text(node, source_code)?;\n            captures.insert(capture.index, text.clone());\n\n            // キャプチャ名に基づいてフィールドを設定\n            // デバッグ出力から判明したインデックスマッピングを使用\n            match capture.index {\n                0 =\u003e function_name = text,   // @i18n.t_func_name\n                1 =\u003e translation_key = text, // @i18n.key\n                _ =\u003e {}                      // その他のキャプチャは無視\n            }\n        }\n\n        let start_position = query_match\n            .captures\n            .first()\n            .map_or((0, 0), |c| (c.node.start_position().row, c.node.start_position().column));\n\n        let end_position = query_match\n            .captures\n            .last()\n            .map_or((0, 0), |c| (c.node.end_position().row, c.node.end_position().column));\n\n        Ok(QueryTranslationReference {\n            key: translation_key,\n            function_name,\n            start_line: start_position.0,\n            start_column: start_position.1,\n            end_line: end_position.0,\n            end_column: end_position.1,\n            captures,\n        })\n    }\n}\n\nimpl Default for QueryExecutor {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl std::fmt::Debug for QueryExecutor {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.debug_struct(\"QueryExecutor\").field(\"cursor\", \u0026\"\u003cQueryCursor\u003e\").finish()\n    }\n}\n\n/// クエリ実行時の翻訳参照情報\n///\n/// tree-sitterクエリ実行で発見された翻訳キーの使用箇所を表します。\n/// types.rsのTranslationReferenceとは異なり、クエリ特有の情報を含みます。\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct QueryTranslationReference {\n    /// 翻訳キー\n    pub key: String,\n    /// 関数名（t, i18n.t 等）\n    pub function_name: String,\n    /// 開始行番号（0ベース）\n    pub start_line: usize,\n    /// 開始列番号（0ベース）\n    pub start_column: usize,\n    /// 終了行番号（0ベース）\n    pub end_line: usize,\n    /// 終了列番号（0ベース）\n    pub end_column: usize,\n    /// クエリキャプチャの詳細情報\n    pub captures: HashMap\u003cu32, String\u003e,\n}\n\nimpl QueryTranslationReference {\n    /// `新しいQueryTranslationReferenceインスタンスを作成`\n    ///\n    /// # Arguments\n    ///\n    /// * `key` - 翻訳キー\n    /// * `function_name` - 関数名\n    /// * `start_line` - 開始行番号\n    /// * `start_column` - 開始列番号\n    /// * `end_line` - 終了行番号\n    /// * `end_column` - 終了列番号\n    ///\n    /// # Returns\n    ///\n    /// `新しいQueryTranslationReferenceインスタンス`\n    #[must_use]\n    pub fn new(\n        key: String,\n        function_name: String,\n        start_line: usize,\n        start_column: usize,\n        end_line: usize,\n        end_column: usize,\n    ) -\u003e Self {\n        Self {\n            key,\n            function_name,\n            start_line,\n            start_column,\n            end_line,\n            end_column,\n            captures: HashMap::new(),\n        }\n    }\n}\n\n/// ノードから文字列リテラルを抽出\n///\n/// # Arguments\n///\n/// * `node` - 文字列リテラルノード\n/// * `source_code` - ソースコード文字列\n///\n/// # Returns\n///\n/// 抽出された文字列。エラーが発生した場合は`Err`を返します。\n///\n/// # Errors\n///\n/// ノードからテキストが抽出できない場合、またはUTF-8デコードに失敗した場合\npub fn extract_string_literal(node: Node\u003c'_\u003e, source_code: \u0026str) -\u003e Result\u003cString\u003e {\n    let text = extract_node_text(node, source_code)?;\n\n    // 文字列リテラルの場合、クォートを除去\n    if text.len() \u003e= 2 \u0026\u0026 (text.starts_with('\"') || text.starts_with('\\'')) {\n        let end_quote = if text.starts_with('\"') { '\"' } else { '\\'' };\n        if text.ends_with(end_quote) {\n            return Ok(text[1..text.len() - 1].to_string());\n        }\n    }\n\n    Ok(text)\n}\n\n/// ノードから識別子を抽出\n///\n/// # Arguments\n///\n/// * `node` - 識別子ノード\n/// * `source_code` - ソースコード文字列\n///\n/// # Returns\n///\n/// 抽出された識別子名。エラーが発生した場合は`Err`を返します。\n///\n/// # Errors\n///\n/// ノードからテキストが抽出できない場合、またはUTF-8デコードに失敗した場合\npub fn extract_identifier(node: Node\u003c'_\u003e, source_code: \u0026str) -\u003e Result\u003cString\u003e {\n    extract_node_text(node, source_code)\n}\n\n/// ノードからテキストを抽出（内部ヘルパー関数）\n///\n/// # Arguments\n///\n/// * `node` - 対象ノード\n/// * `source_code` - ソースコード文字列\n///\n/// # Returns\n///\n/// 抽出されたテキスト。エラーが発生した場合は`Err`を返します。\n///\n/// # Errors\n///\n/// ノードの範囲がソースコード文字列の範囲を超えている場合、\n/// またはUTF-8デコードに失敗した場合\nfn extract_node_text(node: Node\u003c'_\u003e, source_code: \u0026str) -\u003e Result\u003cString\u003e {\n    let start_byte = node.start_byte();\n    let end_byte = node.end_byte();\n\n    if end_byte \u003e source_code.len() {\n        return Err(anyhow::anyhow!(\n            \"Node range {start_byte}..{end_byte} exceeds source code length {}\",\n            source_code.len()\n        ));\n    }\n\n    let text = \u0026source_code[start_byte..end_byte];\n    Ok(text.to_string())\n}\n\n#[cfg(test)]\nmod tests {\n    use tree_sitter::Parser;\n\n    use super::*;\n\n    /// テスト用のパーサーを作成\n    fn create_parser() -\u003e Parser {\n        let mut parser = Parser::new();\n        parser.set_language(language_javascript()).expect(\"Failed to set language\");\n        parser\n    }\n\n    #[test]\n    fn test_translation_queries_creation() {\n        let language = language_javascript();\n        let queries = TranslationQueries::new(language);\n        if let Err(e) = queries {\n            panic!(\"Failed to create queries: {e}\");\n        }\n    }\n\n    #[test]\n    fn test_i18next_trans_f_call_query() {\n        let mut parser = create_parser();\n        let language = language_javascript();\n        let queries = TranslationQueries::new(language).expect(\"Failed to create queries\");\n\n        let source_code = r\"\n        const message = t('hello.world');\n        const greeting = i18n.t('greeting.message', { name: 'User' });\n        \";\n\n        let tree = parser.parse(source_code, None).expect(\"Failed to parse code\");\n        let mut executor = QueryExecutor::new();\n\n        let references = executor\n            .execute_query(queries.i18next_trans_f_call(), \u0026tree, source_code)\n            .expect(\"Failed to execute query\");\n\n        assert!(!references.is_empty());\n    }\n\n    #[test]\n    fn test_extract_string_literal() {\n        let mut parser = create_parser();\n        let source_code = r#\"const test = \"hello world\";\"#;\n\n        let tree = parser.parse(source_code, None).expect(\"Failed to parse code\");\n        let root = tree.root_node();\n        let string_node =\n            root.descendant_for_byte_range(13, 26).expect(\"Failed to find string node\");\n\n        let extracted = extract_string_literal(string_node, source_code)\n            .expect(\"Failed to extract string literal\");\n\n        assert_eq!(extracted, \"hello world\");\n    }\n\n    #[test]\n    fn test_extract_identifier() {\n        let mut parser = create_parser();\n        let source_code = r\"const myVariable = 42;\";\n\n        let tree = parser.parse(source_code, None).expect(\"Failed to parse code\");\n        let root = tree.root_node();\n        let identifier_node =\n            root.descendant_for_byte_range(6, 16).expect(\"Failed to find identifier node\");\n\n        let extracted =\n            extract_identifier(identifier_node, source_code).expect(\"Failed to extract identifier\");\n\n        assert_eq!(extracted, \"myVariable\");\n    }\n\n    #[test]\n    fn test_query_translation_reference_creation() {\n        let reference =\n            QueryTranslationReference::new(\"test.key\".to_string(), \"t\".to_string(), 0, 10, 0, 25);\n\n        assert_eq!(reference.key, \"test.key\");\n        assert_eq!(reference.function_name, \"t\");\n        assert_eq!(reference.start_line, 0);\n        assert_eq!(reference.start_column, 10);\n        assert_eq!(reference.end_line, 0);\n        assert_eq!(reference.end_column, 25);\n    }\n\n    #[test]\n    fn test_query_executor_creation() {\n        let executor = QueryExecutor::new();\n        use std::mem::size_of_val;\n        assert!(size_of_val(\u0026executor) \u003e 0);\n    }\n\n    #[test]\n    fn test_react_trans_component_query() {\n        let mut parser = create_parser();\n        let language = language_javascript();\n        let queries = TranslationQueries::new(language).expect(\"Failed to create queries\");\n\n        let source_code = r#\"\n        const component = \u003cTrans i18nKey=\"welcome.message\" /\u003e;\n        \"#;\n\n        let tree = parser.parse(source_code, None).expect(\"Failed to parse code\");\n        let mut executor = QueryExecutor::new();\n\n        let references = executor\n            .execute_query(queries.react_i18next_trans_component(), \u0026tree, source_code)\n            .expect(\"Failed to execute query\");\n\n        // JSXパーシングはJavaScript grammarでは限定的な場合があるため、\n        // 結果の存在確認よりもクエリが正常に実行されることを確認\n        // references.len() は常に0以上なので、実行が成功したことを確認\n        drop(references);\n    }\n\n    #[test]\n    #[ignore = \"JSX parsing requires more specific language setup\"]\n    fn test_jsx_queries_with_typescript() {\n        let mut parser = Parser::new();\n        parser.set_language(language_typescript()).expect(\"Failed to set TypeScript language\");\n\n        let language = language_typescript();\n\n        // JSXなしで基本クエリをテスト\n        let queries = TranslationQueries::new(language).expect(\"Failed to create basic queries\");\n\n        let source_code = r\"\n        import { useTranslation } from 'react-i18next';\n        \n        const MyComponent = () =\u003e {\n            const { t } = useTranslation();\n            return t('welcome.message');\n        };\n        \";\n\n        let tree = parser.parse(source_code, None).expect(\"Failed to parse TypeScript code\");\n        let mut executor = QueryExecutor::new();\n\n        let references = executor\n            .execute_query(queries.i18next_trans_f_call(), \u0026tree, source_code)\n            .expect(\"Failed to execute basic query\");\n\n        // 実行可能性を確認するのが主目的\n        drop(references);\n    }\n}\n","traces":[{"line":39,"address":[],"length":0,"stats":{"Line":50}},{"line":40,"address":[],"length":0,"stats":{"Line":50}},{"line":49,"address":[],"length":0,"stats":{"Line":14}},{"line":50,"address":[],"length":0,"stats":{"Line":14}},{"line":243,"address":[],"length":0,"stats":{"Line":52}},{"line":244,"address":[],"length":0,"stats":{"Line":104}},{"line":245,"address":[],"length":0,"stats":{"Line":104}},{"line":247,"address":[],"length":0,"stats":{"Line":52}},{"line":248,"address":[],"length":0,"stats":{"Line":0}},{"line":250,"address":[],"length":0,"stats":{"Line":52}},{"line":251,"address":[],"length":0,"stats":{"Line":0}},{"line":255,"address":[],"length":0,"stats":{"Line":52}},{"line":256,"address":[],"length":0,"stats":{"Line":0}},{"line":280,"address":[],"length":0,"stats":{"Line":4}},{"line":281,"address":[],"length":0,"stats":{"Line":8}},{"line":282,"address":[],"length":0,"stats":{"Line":8}},{"line":284,"address":[],"length":0,"stats":{"Line":4}},{"line":285,"address":[],"length":0,"stats":{"Line":0}},{"line":287,"address":[],"length":0,"stats":{"Line":0}},{"line":289,"address":[],"length":0,"stats":{"Line":8}},{"line":291,"address":[],"length":0,"stats":{"Line":0}},{"line":292,"address":[],"length":0,"stats":{"Line":0}},{"line":308,"address":[],"length":0,"stats":{"Line":50}},{"line":309,"address":[],"length":0,"stats":{"Line":50}},{"line":318,"address":[],"length":0,"stats":{"Line":43}},{"line":319,"address":[],"length":0,"stats":{"Line":43}},{"line":328,"address":[],"length":0,"stats":{"Line":1}},{"line":329,"address":[],"length":0,"stats":{"Line":1}},{"line":338,"address":[],"length":0,"stats":{"Line":43}},{"line":339,"address":[],"length":0,"stats":{"Line":43}},{"line":359,"address":[],"length":0,"stats":{"Line":91}},{"li
