s":{"Line":1}},{"line":584,"address":[],"length":0,"stats":{"Line":6601}},{"line":585,"address":[],"length":0,"stats":{"Line":6601}},{"line":586,"address":[],"length":0,"stats":{"Line":6601}},{"line":588,"address":[],"length":0,"stats":{"Line":6601}},{"line":589,"address":[],"length":0,"stats":{"Line":0}},{"line":590,"address":[],"length":0,"stats":{"Line":0}},{"line":591,"address":[],"length":0,"stats":{"Line":0}},{"line":595,"address":[],"length":0,"stats":{"Line":6601}},{"line":596,"address":[],"length":0,"stats":{"Line":6601}}],"covered":60,"coverable":75},{"path":["/","Users","kohei_watanabe","ghq","github.com","nabekou29","js-i18n-language-server","src","translation.rs"],"content":"//! 翻訳リソース管理システム\n//!\n//! このモジュールは以下の機能を提供します：\n//! - JSON/YAMLの翻訳ファイル読み込み\n//! - DashMapベースの高速キャッシュ\n//! - ネームスペース対応\n//! - ファイル監視機能\n//! - 各種i18nライブラリ形式対応\n\nuse std::{\n    collections::HashMap,\n    path::{\n        Path,\n        PathBuf,\n    },\n    sync::{\n        Arc,\n        RwLock,\n        atomic::{\n            AtomicBool,\n            Ordering,\n        },\n    },\n    time::SystemTime,\n};\n\nuse dashmap::DashMap;\nuse notify::{\n    Config,\n    Event,\n    EventKind,\n    RecommendedWatcher,\n    RecursiveMode,\n    Watcher,\n};\nuse serde::{\n    Deserialize,\n    Serialize,\n};\nuse thiserror::Error;\nuse tokio::sync::mpsc;\nuse tracing::{\n    debug,\n    error,\n    info,\n    warn,\n};\nuse walkdir::WalkDir;\n\n/// 翻訳リソース管理に関するエラー型\n#[derive(Error, Debug)]\npub enum TranslationError {\n    /// ファイル読み込みエラー\n    #[error(\"Failed to read file {path}: {source}\")]\n    FileRead {\n        /// ファイルパス\n        path: PathBuf,\n        /// 元のエラー\n        source: std::io::Error,\n    },\n\n    /// JSON解析エラー\n    #[error(\"Failed to parse JSON file {path}: {source}\")]\n    JsonParse {\n        /// ファイルパス\n        path: PathBuf,\n        /// 元のエラー\n        source: serde_json::Error,\n    },\n\n    /// YAML解析エラー\n    #[error(\"Failed to parse YAML file {path}: {source}\")]\n    YamlParse {\n        /// ファイルパス\n        path: PathBuf,\n        /// 元のエラー\n        source: serde_yaml::Error,\n    },\n\n    /// ファイル監視エラー\n    #[error(\"Failed to watch file {path}: {source}\")]\n    FileWatch {\n        /// ファイルパス\n        path: PathBuf,\n        /// 元のエラー\n        source: notify::Error,\n    },\n\n    /// 無効なキー形式エラー\n    #[error(\"Invalid translation key format: {key}\")]\n    InvalidKey {\n        /// 無効なキー\n        key: String,\n    },\n\n    /// 内部エラー\n    #[error(\"Internal error: {message}\")]\n    InternalError {\n        /// エラーメッセージ\n        message: String,\n    },\n\n    /// ネームスペースが見つからないエラー\n    #[error(\"Namespace not found: {namespace}\")]\n    NamespaceNotFound {\n        /// 見つからないネームスペース\n        namespace: String,\n    },\n}\n\n/// 翻訳値を表す型\n#[derive(Debug, Clone, Serialize, Deserialize, PartialEq)]\n#[serde(untagged)]\npub enum TranslationValue {\n    /// 単純な文字列値\n    String(String),\n    /// ネストしたオブジェクト\n    Object(HashMap\u003cString, TranslationValue\u003e),\n    /// 配列値（pluralization対応）\n    Array(Vec\u003cString\u003e),\n}\n\nimpl TranslationValue {\n    /// 値を文字列として取得する\n    ///\n    /// # Returns\n    /// - 文字列値の場合: その値\n    /// - オブジェクトの場合: None\n    /// - 配列の場合: 最初の要素（あれば）\n    pub fn as_string(\u0026self) -\u003e Option\u003c\u0026str\u003e {\n        match self {\n            Self::String(s) =\u003e Some(s),\n            Self::Array(arr) =\u003e arr.first().map(String::as_str),\n            Self::Object(_) =\u003e None,\n        }\n    }\n\n    /// 値がオブジェクトかどうかを判定する\n    ///\n    /// # Returns\n    /// オブジェクトの場合true\n    #[must_use]\n    pub const fn is_object(\u0026self) -\u003e bool {\n        matches!(self, Self::Object(_))\n    }\n\n    /// オブジェクトの全キーを取得する\n    ///\n    /// # Returns\n    /// オブジェクトの場合はキーのベクタ、それ以外は空のベクタ\n    #[must_use]\n    pub fn get_keys(\u0026self) -\u003e Vec\u003cString\u003e {\n        match self {\n            Self::Object(obj) =\u003e obj.keys().cloned().collect(),\n            _ =\u003e Vec::new(),\n        }\n    }\n}\n\n/// 翻訳ファイルのメタデータ\n#[derive(Debug, Clone)]\npub struct TranslationFileMetadata {\n    /// ファイルパス\n    pub path: PathBuf,\n    /// 最終更新時刻\n    pub last_modified: SystemTime,\n    /// ファイル形式\n    pub format: TranslationFileFormat,\n    /// ネームスペース（指定されている場合）\n    pub namespace: Option\u003cString\u003e,\n}\n\n/// 翻訳ファイルの形式\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum TranslationFileFormat {\n    /// JSON形式\n    Json,\n    /// YAML形式\n    Yaml,\n}\n\nimpl TranslationFileFormat {\n    /// ファイル拡張子から形式を判定する\n    ///\n    /// # Arguments\n    /// * `path` - ファイルパス\n    ///\n    /// # Returns\n    /// 判定された形式（不明な場合はNone）\n    #[must_use]\n    pub fn from_path(path: \u0026Path) -\u003e Option\u003cSelf\u003e {\n        let ext = path.extension()?.to_str()?;\n        match ext.to_lowercase().as_str() {\n            \"json\" =\u003e Some(Self::Json),\n            \"yaml\" | \"yml\" =\u003e Some(Self::Yaml),\n            _ =\u003e None,\n        }\n    }\n}\n\n/// ネームスペース付きキー\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct NamespacedKey {\n    /// ネームスペース（オプション）\n    pub namespace: Option\u003cString\u003e,\n    /// キー\n    pub key: String,\n}\n\nimpl NamespacedKey {\n    /// 新しいネームスペース付きキーを作成する\n    ///\n    /// # Arguments\n    /// * `namespace` - ネームスペース\n    /// * `key` - キー\n    #[must_use]\n    pub const fn new(namespace: Option\u003cString\u003e, key: String) -\u003e Self {\n        Self { namespace, key }\n    }\n\n    /// フル形式の文字列表現を取得する\n    ///\n    /// # Returns\n    /// \"namespace:key\" または \"key\" 形式の文字列\n    #[must_use]\n    pub fn full_key(\u0026self) -\u003e String {\n        match \u0026self.namespace {\n            Some(ns) =\u003e format!(\"{ns}:{}\", self.key),\n            None =\u003e self.key.clone(),\n        }\n    }\n\n    /// 文字列からネームスペース付きキーを解析する\n    ///\n    /// # Arguments\n    /// * `input` - 解析する文字列\n    ///\n    /// # Returns\n    /// 解析されたキー、または無効な場合はエラー\n    pub fn parse(input: \u0026str) -\u003e Result\u003cSelf, TranslationError\u003e {\n        if input.is_empty() {\n            return Err(TranslationError::InvalidKey { key: input.to_string() });\n        }\n\n        if let Some((namespace, key)) = input.split_once(':') {\n            if namespace.is_empty() || key.is_empty() {\n                return Err(TranslationError::InvalidKey { key: input.to_string() });\n            }\n            Ok(Self::new(Some(namespace.to_string()), key.to_string()))\n        } else {\n            Ok(Self::new(None, input.to_string()))\n        }\n    }\n}\n\n/// 翻訳キャッシュシステム\npub struct TranslationCache {\n    /// 翻訳データのキャッシュ（ネームスペース -\u003e キー -\u003e 値）\n    cache: DashMap\u003cString, DashMap\u003cString, TranslationValue\u003e\u003e,\n    /// ファイルメタデータのキャッシュ\n    file_metadata: DashMap\u003cPathBuf, TranslationFileMetadata\u003e,\n    /// 監視対象ディレクトリ\n    watched_dirs: RwLock\u003cVec\u003cPathBuf\u003e\u003e,\n    /// ファイル監視の停止フラグ\n    should_stop_watching: Arc\u003cAtomicBool\u003e,\n    /// ファイル監視タスクのハンドル\n    watcher_handle: RwLock\u003cOption\u003ctokio::task::JoinHandle\u003c()\u003e\u003e\u003e,\n}\n\nimpl Default for TranslationCache {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl std::fmt::Debug for TranslationCache {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        f.debug_struct(\"TranslationCache\")\n            .field(\"cache\", \u0026self.cache)\n            .field(\"file_metadata\", \u0026self.file_metadata)\n            .field(\"watched_dirs\", \u0026self.watched_dirs)\n            .field(\"should_stop_watching\", \u0026self.should_stop_watching)\n            .field(\"watcher_handle\", \u0026\"\u003cJoinHandle\u003e\")\n            .finish()\n    }\n}\n\nimpl TranslationCache {\n    /// 新しい翻訳キャッシュを作成する\n    #[must_use]\n    pub fn new() -\u003e Self {\n        Self {\n            cache: DashMap::new(),\n            file_metadata: DashMap::new(),\n            watched_dirs: RwLock::new(Vec::new()),\n            should_stop_watching: Arc::new(AtomicBool::new(false)),\n            watcher_handle: RwLock::new(None),\n        }\n    }\n\n    /// 指定されたディレクトリから翻訳ファイルをロードする\n    ///\n    /// # Arguments\n    /// * `dir_path` - 翻訳ファイルのディレクトリパス\n    ///\n    /// # Returns\n    /// ロードされたファイル数、またはエラー\n    ///\n    /// # Errors\n    /// ディレクトリの読み込みまたはファイルの解析に失敗した場合\n    pub async fn load_directory(\u0026self, dir_path: \u0026Path) -\u003e Result\u003cusize, TranslationError\u003e {\n        info!(\"Loading translations from directory: {}\", dir_path.display());\n\n        let mut file_count = 0;\n\n        for entry in WalkDir::new(dir_path) {\n            let entry = match entry {\n                Ok(e) =\u003e e,\n                Err(e) =\u003e {\n                    warn!(\"Failed to read directory entry: {}\", e);\n                    continue;\n                }\n            };\n\n            if !entry.file_type().is_file() {\n                continue;\n            }\n\n            let path = entry.path();\n            let format = match TranslationFileFormat::from_path(path) {\n                Some(f) =\u003e f,\n                None =\u003e continue,\n            };\n\n            match self.load_file(path, format).await {\n                Ok(()) =\u003e {\n                    file_count += 1;\n                    debug!(\"Loaded translation file: {}\", path.display());\n                }\n                Err(e) =\u003e {\n                    error!(\"Failed to load translation file {}: {}\", path.display(), e);\n                }\n            }\n        }\n\n        info!(\"Loaded {} translation files from {}\", file_count, dir_path.display());\n        Ok(file_count)\n    }\n\n    /// 単一の翻訳ファイルをロードする\n    ///\n    /// # Arguments\n    /// * `file_path` - ファイルパス\n    /// * `format` - ファイル形式\n    ///\n    /// # Returns\n    /// 成功時は()、失敗時はエラー\n    ///\n    /// # Errors\n    /// ファイルの読み込みまたは解析に失敗した場合\n    pub async fn load_file(\n        \u0026self,\n        file_path: \u0026Path,\n        format: TranslationFileFormat,\n    ) -\u003e Result\u003c(), TranslationError\u003e {\n        let content = tokio::fs::read_to_string(file_path)\n            .await\n            .map_err(|e| TranslationError::FileRead { path: file_path.to_path_buf(), source: e })?;\n\n        let translation_data: HashMap\u003cString, TranslationValue\u003e = match format {\n            TranslationFileFormat::Json =\u003e serde_json::from_str(\u0026content).map_err(|e| {\n                TranslationError::JsonParse { path: file_path.to_path_buf(), source: e }\n            })?,\n            TranslationFileFormat::Yaml =\u003e serde_yaml::from_str(\u0026content).map_err(|e| {\n                TranslationError::YamlParse { path: file_path.to_path_buf(), source: e }\n            })?,\n        };\n\n        let namespace = self.extract_namespace_from_path(file_path);\n        let namespace_key = namespace.clone().unwrap_or_else(|| \"default\".to_string());\n\n        // キャッシュに翻訳データを保存\n        let namespace_cache = self.cache.entry(namespace_key.clone()).or_default();\n        self.store_flattened_translations(\u0026namespace_cache, \u0026translation_data, String::new());\n\n        // メタデータを保存\n        let metadata = TranslationFileMetadata {\n            path: file_path.to_path_buf(),\n            last_modified: tokio::fs::metadata(file_path)\n                .await\n                .map_err(|e| TranslationError::FileRead {\n                    path: file_path.to_path_buf(),\n                    source: e,\n                })?\n                .modified()\n                .unwrap_or(SystemTime::UNIX_EPOCH),\n            format,\n            namespace,\n        };\n\n        self.file_metadata.insert(file_path.to_path_buf(), metadata);\n\n        debug!(\n            \"Loaded {} keys from {} (namespace: {})\",\n            namespace_cache.len(),\n            file_path.display(),\n            namespace_key\n        );\n\n        Ok(())\n    }\n\n    /// ネストした翻訳データを平坦化してキャッシュに保存する\n    ///\n    /// # Arguments\n    /// * `cache` - 保存先のキャッシュ\n    /// * `data` - 翻訳データ\n    /// * `prefix` - キーのプレフィックス\n    fn store_flattened_translations(\n        \u0026self,\n        cache: \u0026DashMap\u003cString, TranslationValue\u003e,\n        data: \u0026HashMap\u003cString, TranslationValue\u003e,\n        prefix: String,\n    ) {\n        for (key, value) in data {\n            let full_key = if prefix.is_empty() { key.clone() } else { format!(\"{prefix}.{key}\") };\n\n            match value {\n                TranslationValue::Object(nested) =\u003e {\n                    // ネストしたオブジェクトは再帰的に処理\n                    self.store_flattened_translations(cache, nested, full_key.clone());\n                    // オブジェクト自体もキャッシュに保存（補完用）\n                    cache.insert(full_key, value.clone());\n                }\n                _ =\u003e {\n                    cache.insert(full_key, value.clone());\n                }\n            }\n        }\n    }\n\n    /// ファイルパスからネームスペースを抽出する\n    ///\n    /// # Arguments\n    /// * `file_path` - ファイルパス\n    ///\n    /// # Returns\n    /// 抽出されたネームスペース（見つからない場合はNone）\n    fn extract_namespace_from_path(\u0026self, file_path: \u0026Path) -\u003e Option\u003cString\u003e {\n        file_path.file_stem()?.to_str().map(ToString::to_string)\n    }\n\n    /// 翻訳キーを検索する\n    ///\n    /// # Arguments\n    /// * `key` - 検索するキー\n    ///\n    /// # Returns\n    /// 見つかった翻訳値、または見つからない場合はNone\n    pub fn get_translation(\u0026self, key: \u0026NamespacedKey) -\u003e Option\u003cTranslationValue\u003e {\n        let namespace = key.namespace.as_deref().unwrap_or(\"default\");\n        let namespace_cache = self.cache.get(namespace)?;\n        namespace_cache.get(\u0026key.key).map(|entry| entry.value().clone())\n    }\n\n    /// 指定されたプレフィックスで始まるキーを検索する（補完用）\n    ///\n    /// # Arguments\n    /// * `namespace` - 検索対象のネームスペース\n    /// * `prefix` - キーのプレフィックス\n    /// * `limit` - 結果の最大数\n    ///\n    /// # Returns\n    /// マッチしたキーのベクタ\n    pub fn search_keys_with_prefix(\n        \u0026self,\n        namespace: Option\u003c\u0026str\u003e,\n        prefix: \u0026str,\n        limit: usize,\n    ) -\u003e Vec\u003cString\u003e {\n        let namespace = namespace.unwrap_or(\"default\");\n\n        let Some(namespace_cache) = self.cache.get(namespace) else {\n            return Vec::new();\n        };\n\n        let mut results = Vec::new();\n\n        for entry in namespace_cache.iter() {\n            if results.len() \u003e= limit {\n                break;\n            }\n\n            let key = entry.key();\n            if key.starts_with(prefix) {\n                results.push(key.clone());\n            }\n        }\n\n        results.sort();\n        results\n    }\n\n    /// 指定されたネームスペースの全キーを取得する\n    ///\n    /// # Arguments\n    /// * `namespace` - 対象のネームスペース\n    ///\n    /// # Returns\n    /// キーのベクタ、またはネームスペースが見つからない場合はエラー\n    ///\n    /// # Errors\n    /// 指定されたネームスペースが存在しない場合\n    pub fn get_all_keys(\u0026self, namespace: Option\u003c\u0026str\u003e) -\u003e Result\u003cVec\u003cString\u003e, TranslationError\u003e {\n        let namespace = namespace.unwrap_or(\"default\");\n\n        let Some(namespace_cache) = self.cache.get(namespace) else {\n            return Err(TranslationError::NamespaceNotFound { namespace: namespace.to_string() });\n        };\n\n        let keys: Vec\u003cString\u003e = namespace_cache.iter().map(|entry| entry.key().clone()).collect();\n        Ok(keys)\n    }\n\n    /// 利用可能なネームスペースの一覧を取得する\n    ///\n    /// # Returns\n    /// ネームスペース名のベクタ\n    pub fn get_namespaces(\u0026self) -\u003e Vec\u003cString\u003e {\n        self.cache.iter().map(|entry| entry.key().clone()).collect()\n    }\n\n    /// ディレクトリの監視を開始する\n    ///\n    /// # Arguments\n    /// * `dir_path` - 監視するディレクトリパス\n    ///\n    /// # Returns\n    /// 成功時は()、失敗時はエラー\n    ///\n    /// # Errors\n    /// ファイル監視の設定に失敗した場合\n    pub async fn start_watching(\u0026self, dir_path: PathBuf) -\u003e Result\u003c(), TranslationError\u003e {\n        info!(\"Starting file watcher for directory: {}\", dir_path.display());\n\n        // 監視対象ディレクトリを追加\n        {\n            let mut watched_dirs = self.watched_dirs.write().map_err(|e| {\n                error!(\"Failed to acquire write lock on watched_dirs: {}\", e);\n                TranslationError::InternalError { message: \"Lock poisoned\".to_string() }\n            })?;\n            if !watched_dirs.contains(\u0026dir_path) {\n                watched_dirs.push(dir_path.clone());\n            }\n        }\n\n        // 既に監視が開始されている場合は何もしない\n        if self.watcher_handle.read().map_or_else(\n            |e| {\n                error!(\"Failed to acquire read lock on watcher_handle: {}\", e);\n                false\n            },\n            |guard| guard.is_some(),\n        ) {\n            return Ok(());\n        }\n\n        let (tx, mut rx) = mpsc::unbounded_channel();\n        let should_stop = Arc::clone(\u0026self.should_stop_watching);\n\n        // ファイル監視を設定\n        let mut watcher = RecommendedWatcher::new(\n            move |res: Result\u003cEvent, notify::Error\u003e| {\n                if let Err(e) = tx.send(res) {\n                    error!(\"Failed to send file event: {}\", e);\n                }\n            },\n            Config::default(),\n        )\n        .map_err(|e| TranslationError::FileWatch { path: dir_path.clone(), source: e })?;\n\n        watcher\n            .watch(\u0026dir_path, RecursiveMode::Recursive)\n            .map_err(|e| TranslationError::FileWatch { path: dir_path.clone(), source: e })?;\n\n        // 監視タスクを開始\n        let cache_clone = self.cache.clone();\n        let file_metadata_clone = self.file_metadata.clone();\n\n        let handle = tokio::spawn(async move {\n            // watcherを移動してタスク内で保持\n            let _watcher = watcher;\n\n            while let Some(event_result) = rx.recv().await {\n                if should_stop.load(Ordering::Relaxed) {\n                    break;\n                }\n\n                match event_result {\n                    Ok(event) =\u003e {\n                        Self::handle_file_event(event, \u0026cache_clone, \u0026file_metadata_clone).await;\n                    }\n                    Err(e) =\u003e {\n                        error!(\"File watch error: {}\", e);\n                    }\n                }\n            }\n\n            debug!(\"File watcher task terminated\");\n        });\n\n        // ハンドルを保存\n        if let Ok(mut watcher_handle) = self.watcher_handle.write() {\n            *watcher_handle = Some(handle);\n        } else {\n            error!(\"Failed to acquire write lock on watcher_handle\");\n        }\n\n        info!(\"File watcher started successfully\");\n        Ok(())\n    }\n\n    /// ファイル監視を停止する\n    pub async fn stop_watching(\u0026self) {\n        info!(\"Stopping file watcher\");\n\n        self.should_stop_watching.store(true, Ordering::Relaxed);\n\n        if let Ok(mut handle_guard) = self.watcher_handle.write() {\n            if let Some(handle) = handle_guard.take() {\n                handle.abort();\n                // joinを待たずに続行（abortなので）\n            }\n        } else {\n            error!(\"Failed to acquire write lock on watcher_handle during stop\");\n        }\n\n        debug!(\"File watcher stopped\");\n    }\n\n    /// ファイル変更イベントを処理する\n    ///\n    /// # Arguments\n    /// * `event` - ファイル変更イベント\n    /// * `cache` - 翻訳キャッシュ\n    /// * `file_metadata` - ファイルメタデータキャッシュ\n    async fn handle_file_event(\n        event: Event,\n        cache: \u0026DashMap\u003cString, DashMap\u003cString, TranslationValue\u003e\u003e,\n        file_metadata: \u0026DashMap\u003cPathBuf, TranslationFileMetadata\u003e,\n    ) {\n        if !matches!(event.kind, EventKind::Create(_) | EventKind::Modify(_) | EventKind::Remove(_))\n        {\n            return;\n        }\n\n        for path in event.paths {\n            let Some(format) = TranslationFileFormat::from_path(\u0026path) else {\n                continue;\n            };\n\n            match event.kind {\n                EventKind::Create(_) | EventKind::Modify(_) =\u003e {\n                    debug!(\"Translation file changed: {}\", path.display());\n\n                    // ファイルを再読み込み\n                    if let Err(e) = Self::reload_file(\u0026path, format, cache, file_metadata).await {\n                        error!(\"Failed to reload translation file {}: {}\", path.display(), e);\n                    }\n                }\n                EventKind::Remove(_) =\u003e {\n                    debug!(\"Translation file removed: {}\", path.display());\n\n                    // キャッシュからファイルのデータを削除\n                    if let Some((_, metadata)) = file_metadata.remove(\u0026path) {\n                        if let Some(namespace) = metadata.namespace {\n                            cache.remove(\u0026namespace);\n                        }\n                    }\n                }\n                _ =\u003e {}\n            }\n        }\n    }\n\n    /// 単一ファイルを再読み込みする\n    ///\n    /// # Arguments\n    /// * `file_path` - ファイルパス\n    /// * `format` - ファイル形式\n    /// * `cache` - 翻訳キャッシュ\n    /// * `file_metadata` - ファイルメタデータキャッシュ\n    ///\n    /// # Errors\n    /// ファイルの読み込みまたは解析に失敗した場合\n    async fn reload_file(\n        file_path: \u0026Path,\n        format: TranslationFileFormat,\n        cache: \u0026DashMap\u003cString, DashMap\u003cString, TranslationValue\u003e\u003e,\n        file_metadata: \u0026DashMap\u003cPathBuf, TranslationFileMetadata\u003e,\n    ) -\u003e Result\u003c(), TranslationError\u003e {\n        let content = tokio::fs::read_to_string(file_path)\n            .await\n            .map_err(|e| TranslationError::FileRead { path: file_path.to_path_buf(), source: e })?;\n\n        let translation_data: HashMap\u003cString, TranslationValue\u003e = match format {\n            TranslationFileFormat::Json =\u003e serde_json::from_str(\u0026content).map_err(|e| {\n                TranslationError::JsonParse { path: file_path.to_path_buf(), source: e }\n            })?,\n            TranslationFileFormat::Yaml =\u003e serde_yaml::from_str(\u0026content).map_err(|e| {\n                TranslationError::YamlParse { path: file_path.to_path_buf(), source: e }\n            })?,\n        };\n\n        let namespace = Self::extract_namespace_from_path_static(file_path);\n        let namespace_key = namespace.clone().unwrap_or_else(|| \"default\".to_string());\n\n        // 既存のキャッシュをクリア\n        if let Some(namespace_cache) = cache.get(\u0026namespace_key) {\n            namespace_cache.clear();\n        }\n\n        // 新しいデータでキャッシュを更新\n        let namespace_cache = cache.entry(namespace_key).or_default();\n        Self::store_flattened_translations_static(\n            \u0026namespace_cache,\n            \u0026translation_data,\n            String::new(),\n        );\n\n        // メタデータを更新\n        let metadata = TranslationFileMetadata {\n            path: file_path.to_path_buf(),\n            last_modified: tokio::fs::metadata(file_path)\n                .await\n                .map_err(|e| TranslationError::FileRead {\n                    path: file_path.to_path_buf(),\n                    source: e,\n                })?\n                .modified()\n                .unwrap_or(SystemTime::UNIX_EPOCH),\n            format,\n            namespace,\n        };\n\n        file_metadata.insert(file_path.to_path_buf(), metadata);\n\n        info!(\"Reloaded translation file: {}\", file_path.display());\n        Ok(())\n    }\n\n    /// ファイルパスからネームスペースを抽出する（静的メソッド版）\n    ///\n    /// # Arguments\n    /// * `file_path` - ファイルパス\n    ///\n    /// # Returns\n    /// 抽出されたネームスペース（見つからない場合はNone）\n    fn extract_namespace_from_path_static(file_path: \u0026Path) -\u003e Option\u003cString\u003e {\n        file_path.file_stem()?.to_str().map(ToString::to_string)\n    }\n\n    /// ネストした翻訳データを平坦化してキャッシュに保存する（静的メソッド版）\n    ///\n    /// # Arguments\n    /// * `cache` - 保存先のキャッシュ\n    /// * `data` - 翻訳データ\n    /// * `prefix` - キーのプレフィックス\n    fn store_flattened_translations_static(\n        cache: \u0026DashMap\u003cString, TranslationValue\u003e,\n        data: \u0026HashMap\u003cString, TranslationValue\u003e,\n        prefix: String,\n    ) {\n        for (key, value) in data {\n            let full_key = if prefix.is_empty() { key.clone() } else { format!(\"{prefix}.{key}\") };\n\n            match value {\n                TranslationValue::Object(nested) =\u003e {\n                    // ネストしたオブジェクトは再帰的に処理\n                    Self::store_flattened_translations_static(cache, nested, full_key.clone());\n                    // オブジェクト自体もキャッシュに保存（補完用）\n                    cache.insert(full_key, value.clone());\n                }\n                _ =\u003e {\n                    cache.insert(full_key, value.clone());\n                }\n            }\n        }\n    }\n\n    /// キャッシュをクリアする\n    pub fn clear(\u0026self) {\n        self.cache.clear();\n        self.file_metadata.clear();\n        info!(\"Translation cache cleared\");\n    }\n\n    /// 統計情報を取得する\n    ///\n    /// # Returns\n    /// キャッシュ統計情報\n    pub fn get_stats(\u0026self) -\u003e TranslationCacheStats {\n        let mut total_keys = 0;\n        let namespace_count = self.cache.len();\n\n        for namespace_cache in \u0026self.cache {\n            total_keys += namespace_cache.value().len();\n        }\n\n        TranslationCacheStats { namespace_count, total_keys, file_count: self.file_metadata.len() }\n    }\n}\n\nimpl Drop for TranslationCache {\n    fn drop(\u0026mut self) {\n        // 非同期処理なので、blocking呼び出しは使用しない\n        self.should_stop_watching.store(true, Ordering::Relaxed);\n    }\n}\n\n/// 翻訳キャッシュの統計情報\n#[derive(Debug, Clone, Copy)]\npub struct TranslationCacheStats {\n    /// ネームスペース数\n    pub namespace_count: usize,\n    /// 総キー数\n    pub total_keys: usize,\n    /// ファイル数\n    pub file_count: usize,\n}\n\n#[cfg(test)]\nmod tests {\n    use std::collections::HashMap;\n\n    use pretty_assertions::assert_eq;\n\n    use super::*;\n\n    #[test]\n    fn test_translation_value_as_string() {\n        let string_value = TranslationValue::String(\"test\".to_string());\n        assert_eq!(string_value.as_string(), Some(\"test\"));\n\n        let array_value = TranslationValue::Array(vec![\"first\".to_string(), \"second\".to_string()]);\n        assert_eq!(array_value.as_string(), Some(\"first\"));\n\n        let object_value = TranslationValue::Object(HashMap::new());\n        assert_eq!(object_value.as_string(), None);\n    }\n\n    #[test]\n    fn test_translation_value_is_object() {\n        let string_value = TranslationValue::String(\"test\".to_string());\n        assert!(!string_value.is_object());\n\n        let object_value = TranslationValue::Object(HashMap::new());\n        assert!(object_value.is_object());\n    }\n\n    #[test]\n    fn test_translation_file_format_from_path() {\n        let json_path = Path::new(\"test.json\");\n        assert_eq!(TranslationFileFormat::from_path(json_path), Some(TranslationFileFormat::Json));\n\n        let yaml_path = Path::new(\"test.yaml\");\n        assert_eq!(TranslationFileFormat::from_path(yaml_path), Some(TranslationFileFormat::Yaml));\n\n        let yml_path = Path::new(\"test.yml\");\n        assert_eq!(TranslationFileFormat::from_path(yml_path), Some(TranslationFileFormat::Yaml));\n\n        let unknown_path = Path::new(\"test.txt\");\n        assert_eq!(TranslationFileFormat::from_path(unknown_path), None);\n    }\n\n    #[test]\n    fn test_namespaced_key_parse() {\n        let key = NamespacedKey::parse(\"common:hello\").unwrap();\n        assert_eq!(key.namespace, Some(\"common\".to_string()));\n        assert_eq!(key.key, \"hello\");\n        assert_eq!(key.full_key(), \"common:hello\");\n\n        let key_no_namespace = NamespacedKey::parse(\"hello\").unwrap();\n        assert_eq!(key_no_namespace.namespace, None);\n        assert_eq!(key_no_namespace.key, \"hello\");\n        assert_eq!(key_no_namespace.full_key(), \"hello\");\n\n        // 無効なキーのテスト\n        assert!(NamespacedKey::parse(\"\").is_err());\n        assert!(NamespacedKey::parse(\":hello\").is_err());\n        assert!(NamespacedKey::parse(\"common:\").is_err());\n    }\n\n    #[test]\n    fn test_translation_cache_basic_operations() {\n        let cache = TranslationCache::new();\n\n        // テスト用の翻訳データを準備\n        let mut test_data = HashMap::new();\n        test_data\n            .insert(\"hello\".to_string(), TranslationValue::String(\"Hello, World!\".to_string()));\n\n        let mut nested_data = HashMap::new();\n        nested_data\n            .insert(\"greeting\".to_string(), TranslationValue::String(\"Good morning\".to_string()));\n        test_data.insert(\"morning\".to_string(), TranslationValue::Object(nested_data));\n\n        // データをキャッシュに保存（Direct manipulation to avoid self-referencing calls）\n        {\n            let namespace_cache = cache.cache.entry(\"test\".to_string()).or_default();\n            TranslationCache::store_flattened_translations_static(\n                \u0026namespace_cache,\n                \u0026test_data,\n                String::new(),\n            );\n        }\n\n        // データを取得してテスト\n        let key = NamespacedKey::new(Some(\"test\".to_string()), \"hello\".to_string());\n        let value = cache.get_translation(\u0026key).unwrap();\n        assert_eq!(value.as_string(), Some(\"Hello, World!\"));\n\n        // ネストしたキーのテスト\n        let nested_key =\n            NamespacedKey::new(Some(\"test\".to_string()), \"morning.greeting\".to_string());\n        let nested_value = cache.get_translation(\u0026nested_key).unwrap();\n        assert_eq!(nested_value.as_string(), Some(\"Good morning\"));\n\n        // プレフィックス検索のテスト\n        let results = cache.search_keys_with_prefix(Some(\"test\"), \"morn\", 10);\n        assert!(results.contains(\u0026\"morning\".to_string()));\n        assert!(results.contains(\u0026\"morning.greeting\".to_string()));\n    }\n\n    #[test]\n    fn test_translation_cache_stats() {\n        let cache = TranslationCache::new();\n\n        // 統計情報の初期状態をテスト\n        let stats = cache.get_stats();\n        assert_eq!(stats.namespace_count, 0);\n        assert_eq!(stats.total_keys, 0);\n        assert_eq!(stats.file_count, 0);\n\n        // データを追加\n        {\n            let namespace_cache = cache.cache.entry(\"test\".to_string()).or_default();\n            namespace_cache\n                .insert(\"key1\".to_string(), TranslationValue::String(\"value1\".to_string()));\n            namespace_cache\n                .insert(\"key2\".to_string(), TranslationValue::String(\"value2\".to_string()));\n        }\n\n        // 統計情報を再取得してテスト\n        let stats = cache.get_stats();\n        assert_eq!(stats.namespace_count, 1);\n        assert_eq!(stats.total_keys, 2);\n    }\n\n    #[test]\n    fn test_translation_cache_clear() {\n        let cache = TranslationCache::new();\n\n        // データを追加\n        {\n            let namespace_cache = cache.cache.entry(\"test\".to_string()).or_default();\n            namespace_cache\n                .insert(\"key1\".to_string(), TranslationValue::String(\"value1\".to_string()));\n        }\n\n        // データが存在することを確認\n        assert_eq!(cache.get_stats().total_keys, 1);\n\n        // クリア\n        cache.clear();\n\n        // データがクリアされたことを確認\n        assert_eq!(cache.get_stats().total_keys, 0);\n        assert_eq!(cache.get_stats().namespace_count, 0);\n    }\n\n    #[test]\n    fn test_namespaced_key_new() {\n        let key = NamespacedKey::new(Some(\"ns\".to_string()), \"key\".to_string());\n        assert_eq!(key.namespace, Some(\"ns\".to_string()));\n        assert_eq!(key.key, \"key\");\n\n        let key_no_ns = NamespacedKey::new(None, \"key\".to_string());\n        assert_eq!(key_no_ns.namespace, None);\n        assert_eq!(key_no_ns.key, \"key\");\n    }\n\n    #[test]\n    fn test_translation_value_get_keys() {\n        let mut obj = HashMap::new();\n        obj.insert(\"key1\".to_string(), TranslationValue::String(\"value1\".to_string()));\n        obj.insert(\"key2\".to_string(), TranslationValue::String(\"value2\".to_string()));\n\n        let object_value = TranslationValue::Object(obj);\n        let mut keys = object_value.get_keys();\n        keys.sort();\n        assert_eq!(keys, vec![\"key1\", \"key2\"]);\n\n        let string_value = TranslationValue::String(\"test\".to_string());\n        assert_eq!(string_value.get_keys(), Vec::\u003cString\u003e::new());\n    }\n}\n\n","traces":[{"line":130,"address":[],"length":0,"stats":{"Line":5}},{"line":131,"address":[],"length":0,"stats":{"Line":5}},{"line":132,"address":[],"length":0,"stats":{"Line":3}},{"line":133,"address":[],"length":0,"stats":{"Line":1}},{"line":134,"address":[],"length":0,"stats":{"Line":1}},{"line":143,"address":[],"length":0,"stats":{"Line":2}},{"line":144,"address":[],"length":0,"stats":{"Line":3}},{"line":152,"address":[],"length":0,"stats":{"Line":2}},{"line":153,"address":[],"length":0,"stats":{"Line":2}},{"line":154,"address":[],"length":0,"stats":{"Line":1}},{"line":155,"address":[],"length":0,"stats":{"Line":1}},{"line":191,"address":[],"length":0,"stats":{"Line":4}},{"line":192,"address":[],"length":0,"stats":{"Line":12}},{"line":194,"address":[],"length":0,"stats":{"Line":1}},{"line":195,"address":[],"length":0,"stats":{"Line":7}},{"line":196,"address":[],"length":0,"stats":{"Line":1}},{"line":217,"address":[],"length":0,"stats":{"Line":6}},{"line":226,"address":[],"length":0,"stats":{"Line":2}},{"line":227,"address":[],"length":0,"stats":{"Line":2}},{"line":228,"address":[],"length":0,"stats":{"Line":1}},{"line":229,"address":[],"length":0,"stats":{"Line":1}},{"line":240,"address":[],"length":0,"stats":{"Line":5}},{"line":241,"address":[],"length":0,"stats":{"Line":5}},{"line":242,"addres ,"address":[],"length":0,"stats":{"Line":0}},{"line":706,"address":[],"length":0,"stats":{"Line":0}},{"line":707,"address":[],"length":0,"stats":{"Line":0}},{"line":708,"address":[],"length":0,"stats":{"Line":0}},{"line":710,"address":[],"length":0,"stats":{"Line":0}},{"line":711,"address":[],"length":0,"stats":{"Line":0}},{"line":716,"address":[],"length":0,"stats":{"Line":0}},{"line":719,"address":[],"length":0,"stats":{"Line":0}},{"line":748,"address":[],"length":0,"stats":{"Line":0}},{"line":759,"address":[],"length":0,"stats":{"Line":0}},{"line":760,"address":[],"length":0,"stats":{"Line":0}},{"line":769,"address":[],"length":0,"stats":{"Line":2}},{"line":774,"address":[],"length":0,"stats":{"Line":8}},{"line":775,"address":[],"length":0,"stats":{"Line":3}},{"line":778,"address":[],"length":0,"stats":{"Line":1}},{"line":780,"address":[],"length":0,"stats":{"Line":1}},{"line":782,"address":[],"length":0,"stats":{"Line":1}},{"line":784,"address":[],"length":0,"stats":{"Line":2}},{"line":785,"address":[],"length":0,"stats":{"Line":2}},{"line":792,"address":[],"length":0,"stats":{"Line":2}},{"line":793,"address":[],"length":0,"stats":{"Line":2}},{"line":794,"address":[],"length":0,"stats":{"Line":2}},{"line":795,"address":[],"length":0,"stats":{"Line":2}},{"line":802,"address":[],"length":0,"stats":{"Line":8}},{"line":803,"address":[],"length":0,"stats":{"Line":8}},{"line":804,"address":[],"length":0,"stats":{"Line":8}},{"line":806,"address":[],"length":0,"stats":{"Line":12}},{"line":810,"address":[],"length":0,"stats":{"Line":8}},{"line":815,"address":[],"length":0,"stats":{"Line":9}},{"line":817,"address":[],"length":0,"stats":{"Line":9}}],"covered":67,"coverable":196},{"path":["/","Users","kohei_watanabe","ghq","github.com","nabekou29","js-i18n-language-server","src","types.rs"],"content":"//! i18n言語サーバーの基本データ構造定義\n//!\n//! このモジュールは、JavaScript/TypeScript向けi18n言語サーバーで使用される\n//! 基本的なデータ構造を定義します。ADR-003に準拠したFileId型とTranslationReference構造体、\n//! およびスコープ管理、解析結果、ファイル種別の型定義を含みます。\n//!\n//! # 設計原則\n//!\n//! - メモリ効率化のためFileId型を使用してファイルパスを数値で管理\n//! - 厳格なエラーハンドリングでpanic禁止、Result型を適切に使用\n//! - すべてのパブリック項目に文書化を提供\n//!\n//! # 作成者\n//! @nabekou29\n//!\n//! # 作成日\n//! 2025-06-15\n//!\n//! # 更新日\n//! 2025-06-15 - エラーハンドリング強化実装\n\nuse std::collections::HashMap;\nuse std::fmt;\nuse std::path::PathBuf;\nuse std::time::SystemTime;\n\nuse thiserror::Error;\nuse tracing::{\n    Level,\n    event,\n};\n\n/// ファイルパスを数値で表現するID型\n///\n/// メモリ効率化のために、ファイルパスを数値IDで管理します。\n/// ADR-003で決定された設計に従い、文字列の代わりに数値を使用することで\n/// メモリ使用量を削減し、比較処理を高速化します。\n///\n/// # 例\n///\n/// ```rust\n/// use js_i18n_language_server::types::FileId;\n///\n/// let file_id = FileId(1);\n/// assert_eq!(file_id.0, 1);\n/// ```\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, PartialOrd, Ord)]\npub struct FileId(pub u32);\n\nimpl FileId {\n    /// `新しいFileIdを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `id` - ファイルを識別する数値ID\n    ///\n    /// # 戻り値\n    ///\n    /// `指定されたIDを持つFileId`\n    #[must_use]\n    pub const fn new(id: u32) -\u003e Self {\n        Self(id)\n    }\n\n    /// `FileIdの数値を取得します`\n    ///\n    /// # 戻り値\n    ///\n    /// `FileIdの内部数値`\n    #[must_use]\n    pub const fn as_u32(\u0026self) -\u003e u32 {\n        self.0\n    }\n}\n\n/// 文言取得関数の呼び出し参照情報\n///\n/// i18n関数呼び出し（`i18n.t('key')`, `t('key')`, `\u003cTrans key='key' /\u003e`等）の\n/// 詳細な参照情報を保持します。位置情報、使用されているキー、名前空間などの\n/// 情報を含み、補完や診断機能の基盤となります。\n///\n/// # フィールド\n///\n/// * `file_id` - 参照が存在するファイルのID\n/// * `line` - 行番号（0ベース）\n/// * `column` - 列番号（0ベース）\n/// * `key` - 使用されている翻訳キー\n/// * `namespace` - 名前空間（存在する場合）\n/// * `function_name` - 呼び出し関数名（t, i18n.t, Trans等）\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct TranslationReference {\n    /// 参照が存在するファイルのID\n    pub file_id: FileId,\n    /// 行番号（0ベース）\n    pub line: u32,\n    /// 列番号（0ベース）\n    pub column: u32,\n    /// 使用されている翻訳キー\n    pub key: String,\n    /// 名前空間（i18nextなどで使用）\n    pub namespace: Option\u003cString\u003e,\n    /// 呼び出し関数名（t, i18n.t, Trans等）\n    pub function_name: String,\n}\n\nimpl TranslationReference {\n    /// `新しいTranslationReferenceを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `file_id` - 参照が存在するファイルのID\n    /// * `line` - 行番号（0ベース）\n    /// * `column` - 列番号（0ベース）\n    /// * `key` - 使用されている翻訳キー\n    /// * `namespace` - 名前空間（オプション）\n    /// * `function_name` - 呼び出し関数名\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいTranslationReference`\n    #[must_use]\n    pub const fn new(\n        file_id: FileId,\n        line: u32,\n        column: u32,\n        key: String,\n        namespace: Option\u003cString\u003e,\n        function_name: String,\n    ) -\u003e Self {\n        Self { file_id, line, column, key, namespace, function_name }\n    }\n}\n\n/// スコープ管理情報\n///\n/// JavaScript/TypeScriptのスコープ階層を管理し、変数の有効範囲や\n/// import文の影響範囲を追跡します。i18n関数のインポート状況や\n/// 別名定義などを含みます。\n///\n/// # フィールド\n///\n/// * `file_id` - スコープが存在するファイルのID\n/// * `start_line` - スコープ開始行（0ベース）\n/// * `end_line` - スコープ終了行（0ベース）\n/// * `imported_functions` - インポートされたi18n関数のマップ（別名 -\u003e 元の名前）\n/// * `parent_scope` - 親スコープのID（存在する場合）\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct ScopeInfo {\n    /// スコープが存在するファイルのID\n    pub file_id: FileId,\n    /// スコープ開始行（0ベース）\n    pub start_line: u32,\n    /// スコープ終了行（0ベース）\n    pub end_line: u32,\n    /// インポートされたi18n関数のマップ（別名 -\u003e 元の名前）\n    pub imported_functions: HashMap\u003cString, String\u003e,\n    /// 親スコープのID（存在する場合）\n    pub parent_scope: Option\u003cu32\u003e,\n}\n\nimpl ScopeInfo {\n    /// `新しいScopeInfoを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `file_id` - スコープが存在するファイルのID\n    /// * `start_line` - スコープ開始行\n    /// * `end_line` - スコープ終了行\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいScopeInfo`\n    #[must_use]\n    pub fn new(file_id: FileId, start_line: u32, end_line: u32) -\u003e Self {\n        Self {\n            file_id,\n            start_line,\n            end_line,\n            imported_functions: HashMap::new(),\n            parent_scope: None,\n        }\n    }\n\n    /// インポートされた関数を追加します\n    ///\n    /// # 引数\n    ///\n    /// * `alias` - 関数の別名\n    /// * `original` - 元の関数名\n    pub fn add_imported_function(\u0026mut self, alias: String, original: String) {\n        self.imported_functions.insert(alias, original);\n    }\n\n    /// 指定された行がこのスコープ内にあるかを判定します\n    ///\n    /// # 引数\n    ///\n    /// * `line` - 判定する行番号\n    ///\n    /// # 戻り値\n    ///\n    /// スコープ内にある場合はtrue\n    #[must_use]\n    pub const fn contains_line(\u0026self, line: u32) -\u003e bool {\n        line \u003e= self.start_line \u0026\u0026 line \u003c= self.end_line\n    }\n}\n\n/// ファイル解析結果\n///\n/// 単一ファイルの解析結果を保持します。見つかった翻訳参照、\n/// スコープ情報、エラー情報を含みます。\n///\n/// # フィールド\n///\n/// * `file_id` - 解析対象ファイルのID\n/// * `references` - 見つかった翻訳参照のリスト\n/// * `scopes` - ファイル内のスコープ情報のリスト\n/// * `errors` - 解析中に発生したエラーのリスト\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct AnalysisResult {\n    /// 解析対象ファイルのID\n    pub file_id: FileId,\n    /// 見つかった翻訳参照のリスト\n    pub references: Vec\u003cTranslationReference\u003e,\n    /// ファイル内のスコープ情報のリスト\n    pub scopes: Vec\u003cScopeInfo\u003e,\n    /// 解析中に発生したエラーのリスト\n    pub errors: Vec\u003cAnalysisError\u003e,\n}\n\nimpl AnalysisResult {\n    /// `新しいAnalysisResultを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `file_id` - 解析対象ファイルのID\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいAnalysisResult`\n    #[must_use]\n    pub const fn new(file_id: FileId) -\u003e Self {\n        Self { file_id, references: Vec::new(), scopes: Vec::new(), errors: Vec::new() }\n    }\n\n    /// 翻訳参照を追加します\n    ///\n    /// # 引数\n    ///\n    /// * `reference` - 追加する翻訳参照\n    pub fn add_reference(\u0026mut self, reference: TranslationReference) {\n        self.references.push(reference);\n    }\n\n    /// スコープ情報を追加します\n    ///\n    /// # 引数\n    ///\n    /// * `scope` - 追加するスコープ情報\n    pub fn add_scope(\u0026mut self, scope: ScopeInfo) {\n        self.scopes.push(scope);\n    }\n\n    /// エラーを追加します\n    ///\n    /// # 引数\n    ///\n    /// * `error` - 追加するエラー\n    pub fn add_error(\u0026mut self, error: AnalysisError) {\n        self.errors.push(error);\n    }\n\n    /// エラーが存在するかを判定します\n    ///\n    /// # 戻り値\n    ///\n    /// エラーが存在する場合はtrue\n    #[must_use]\n    pub const fn has_errors(\u0026self) -\u003e bool {\n        !self.errors.is_empty()\n    }\n}\n\n/// サポートされるファイル種別\n///\n/// JavaScript/TypeScriptエコシステムでサポートされるファイル形式を\n/// 定義します。各ファイル種別に応じて異なる解析ルールが適用されます。\n///\n/// # バリアント\n///\n/// * `JavaScript` - .jsファイル\n/// * `TypeScript` - .tsファイル\n/// * `JavaScriptReact` - .jsxファイル（React JSX）\n/// * `TypeScriptReact` - .tsxファイル（React TSX）\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\npub enum FileType {\n    /// .jsファイル\n    JavaScript,\n    /// .tsファイル\n    TypeScript,\n    /// .jsxファイル（React JSX）\n    JavaScriptReact,\n    /// .tsxファイル（React TSX）\n    TypeScriptReact,\n}\n\nimpl FileType {\n    /// `ファイルパスからFileTypeを判定します`\n    ///\n    /// # 引数\n    ///\n    /// * `path` - 判定するファイルパス\n    ///\n    /// # 戻り値\n    ///\n    /// 判定結果のResult。サポートされていない拡張子の場合はエラー\n    ///\n    /// # エラー\n    ///\n    /// サポートされていないファイル拡張子の場合、`AnalysisError::UnsupportedFileType`を返します\n    pub fn from_path(path: \u0026PathBuf) -\u003e Result\u003cSelf, AnalysisError\u003e {\n        match path.extension().and_then(|ext| ext.to_str()) {\n            Some(\"js\") =\u003e Ok(Self::JavaScript),\n            Some(\"ts\") =\u003e Ok(Self::TypeScript),\n            Some(\"jsx\") =\u003e Ok(Self::JavaScriptReact),\n            Some(\"tsx\") =\u003e Ok(Self::TypeScriptReact),\n            Some(ext) =\u003e Err(AnalysisError::UnsupportedFileType {\n                extension: ext.to_string(),\n                path: path.clone(),\n                context: ErrorContext::new(\"FileType::from_path\".to_string(), ErrorSeverity::Error),\n            }),\n            None =\u003e Err(AnalysisError::UnsupportedFileType {\n                extension: \"none\".to_string(),\n                path: path.clone(),\n                context: ErrorContext::new(\"FileType::from_path\".to_string(), ErrorSeverity::Error),\n            }),\n        }\n    }\n\n    /// ファイル種別が TypeScript系（.ts, .tsx）かを判定します\n    ///\n    /// # 戻り値\n    ///\n    /// `TypeScript系の場合はtrue`\n    #[must_use]\n    pub const fn is_typescript(\u0026self) -\u003e bool {\n        matches!(self, Self::TypeScript | Self::TypeScriptReact)\n    }\n\n    /// ファイル種別がReact系（.jsx, .tsx）かを判定します\n    ///\n    /// # 戻り値\n    ///\n    /// React系の場合はtrue\n    #[must_use]\n    pub const fn is_react(\u0026self) -\u003e bool {\n        matches!(self, Self::JavaScriptReact | Self::TypeScriptReact)\n    }\n\n    /// ファイル種別の拡張子を取得します\n    ///\n    /// # 戻り値\n    ///\n    /// ファイル拡張子の文字列\n    #[must_use]\n    pub const fn extension(\u0026self) -\u003e \u0026'static str {\n        match self {\n            Self::JavaScript =\u003e \"js\",\n            Self::TypeScript =\u003e \"ts\",\n            Self::JavaScriptReact =\u003e \"jsx\",\n            Self::TypeScriptReact =\u003e \"tsx\",\n        }\n    }\n}\n\n/// エラーの詳細位置情報\n///\n/// ソースコード内での正確な位置を表現します。\n/// 1ベースの行・列番号とバイトオフセットを含みます。\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub struct Position {\n    /// 行番号（1ベース）\n    pub line: u32,\n    /// 列番号（1ベース）\n    pub column: u32,\n    /// ファイル内のバイトオフセット（0ベース）\n    pub byte_offset: u32,\n}\n\nimpl Position {\n    /// 新しいPositionを作成します\n    ///\n    /// # 引数\n    ///\n    /// * `line` - 行番号（1ベース）\n    /// * `column` - 列番号（1ベース）\n    /// * `byte_offset` - バイトオフセット（0ベース）\n    ///\n    /// # 戻り値\n    ///\n    /// 新しいPosition\n    #[must_use]\n    pub const fn new(line: u32, column: u32, byte_offset: u32) -\u003e Self {\n        Self { line, column, byte_offset }\n    }\n}\n\nimpl fmt::Display for Position {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"{}:{}\", self.line, self.column)\n    }\n}\n\n/// ソースコードの範囲情報\n///\n/// エラーが発生したソースコードの範囲を表現します。\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct SourceRange {\n    /// 開始位置\n    pub start: Position,\n    /// 終了位置\n    pub end: Position,\n}\n\nimpl SourceRange {\n    /// `新しいSourceRangeを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `start` - 開始位置\n    /// * `end` - 終了位置\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいSourceRange`\n    #[must_use]\n    pub const fn new(start: Position, end: Position) -\u003e Self {\n        Self { start, end }\n    }\n\n    /// `単一位置からSourceRangeを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `position` - 位置情報\n    ///\n    /// # 戻り値\n    ///\n    /// 同じ開始・終了位置を持つSourceRange\n    #[must_use]\n    pub const fn from_position(position: Position) -\u003e Self {\n        Self { start: position, end: position }\n    }\n}\n\nimpl fmt::Display for SourceRange {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        if self.start == self.end {\n            write!(f, \"{}\", self.start)\n        } else {\n            write!(f, \"{}-{}\", self.start, self.end)\n        }\n    }\n}\n\n/// エラーの重要度\n///\n/// エラーの深刻度を分類し、適切な処理レベルを決定します。\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash)]\npub enum ErrorSeverity {\n    /// 致命的エラー（処理継続不可能）\n    Fatal,\n    /// エラー（機能に影響あり）\n    Error,\n    /// 警告（軽微な問題）\n    Warning,\n    /// 情報（参考情報）\n    Info,\n}\n\nimpl fmt::Display for ErrorSeverity {\n    fn fmt(\u0026self, f: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        match self {\n            Self::Fatal =\u003e write!(f, \"FATAL\"),\n            Self::Error =\u003e write!(f, \"ERROR\"),\n            Self::Warning =\u003e write!(f, \"WARNING\"),\n            Self::Info =\u003e write!(f, \"INFO\"),\n        }\n    }\n}\n\n/// エラーコンテキスト情報\n///\n/// エラーが発生した際の詳細なコンテキスト情報を保持します。\n/// トレーサブルなエラー処理とデバッグ支援のために使用されます。\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct ErrorContext {\n    /// ファイルID\n    pub file_id: Option\u003cFileId\u003e,\n    /// ファイルパス\n    pub file_path: Option\u003cPathBuf\u003e,\n    /// 発生時刻（UNIX時間）\n    pub timestamp: u64,\n    /// エラー発生関数\n    pub function_name: String,\n    /// エラーの重要度\n    pub severity: ErrorSeverity,\n    /// 追加のメタデータ\n    pub metadata: HashMap\u003cString, String\u003e,\n}\n\nimpl ErrorContext {\n    /// `新しいErrorContextを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `function_name` - エラー発生関数名\n    /// * `severity` - エラーの重要度\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいErrorContext`\n    #[must_use]\n    pub fn new(function_name: String, severity: ErrorSeverity) -\u003e Self {\n        Self {\n            file_id: None,\n            file_path: None,\n            timestamp: SystemTime::now()\n                .duration_since(SystemTime::UNIX_EPOCH)\n                .unwrap_or_default()\n                .as_secs(),\n            function_name,\n            severity,\n            metadata: HashMap::new(),\n        }\n    }\n\n    /// ファイル情報を設定します\n    ///\n    /// # 引数\n    ///\n    /// * `file_id` - ファイルID\n    /// * `file_path` - ファイルパス\n    ///\n    /// # 戻り値\n    ///\n    /// `更新されたErrorContext`\n    #[must_use]\n    pub fn with_file(mut self, file_id: FileId, file_path: PathBuf) -\u003e Self {\n        self.file_id = Some(file_id);\n        self.file_path = Some(file_path);\n        self\n    }\n\n    /// メタデータを追加します\n    ///\n    /// # 引数\n    ///\n    /// * `key` - メタデータキー\n    /// * `value` - メタデータ値\n    ///\n    /// # 戻り値\n    ///\n    /// `更新されたErrorContext`\n    #[must_use]\n    pub fn with_metadata(mut self, key: String, value: String) -\u003e Self {\n        self.metadata.insert(key, value);\n        self\n    }\n}\n\nimpl Default for ErrorContext {\n    fn default() -\u003e Self {\n        Self::new(\"unknown\".to_string(), ErrorSeverity::Error)\n    }\n}\n\n/// 解析エラー型定義\n///\n/// i18n言語サーバーで発生する可能性のあるエラーを定義します。\n/// thiserrorクレートを使用して適切なエラーハンドリングを提供します。\n/// エラーコンテキスト情報、種別の細分化、位置情報の詳細化を含みます。\n///\n/// # バリアント\n///\n/// ## ファイル関連エラー\n/// * `UnsupportedFileType` - サポートされていないファイル種別\n/// * `FileTooLarge` - ファイルサイズ制限超過\n/// * `FileReadError` - ファイル読み込みエラー\n/// * `FileEncodingError` - ファイルエンコーディングエラー\n///\n/// ## 構文解析エラー\n/// * `ParseError` - 構文解析エラー\n/// * `TreeSitterError` - tree-sitter解析エラー\n/// * `QueryExecutionError` - クエリ実行エラー\n///\n/// ## 翻訳関連エラー\n/// * `InvalidTranslationKey` - 無効な翻訳キー\n/// * `MissingTranslation` - 翻訳が見つからない\n/// * `DuplicateTranslationKey` - 重複する翻訳キー\n/// * `InvalidNamespace` - 無効な名前空間\n/// * `TranslationResourceError` - 翻訳リソースエラー\n///\n/// ## システムエラー\n/// * `MemoryLimitExceeded` - メモリ使用量制限超過\n/// * `TimeoutError` - 処理タイムアウト\n/// * `InternalError` - 内部エラー\n#[derive(Error, Debug, Clone, PartialEq, Eq)]\npub enum AnalysisError {\n    /// サポートされていないファイル種別エラー\n    #[error(\"Unsupported file type: .{extension} (file: {path:?})\")]\n    UnsupportedFileType {\n        /// ファイル拡張子\n        extension: String,\n        /// ファイルパス\n        path: PathBuf,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// ファイルサイズ制限超過エラー\n    #[error(\"File too large: {size} bytes exceeds limit of {limit} bytes (file: {path:?})\")]\n    FileTooLarge {\n        /// ファイルサイズ（バイト）\n        size: u64,\n        /// サイズ制限（バイト）\n        limit: u64,\n        /// ファイルパス\n        path: PathBuf,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// ファイル読み込みエラー\n    #[error(\"Failed to read file: {path:?} - {reason}\")]\n    FileReadError {\n        /// ファイルパス\n        path: PathBuf,\n        /// エラー理由\n        reason: String,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// ファイルエンコーディングエラー\n    #[error(\"Invalid file encoding: {path:?} - expected UTF-8\")]\n    FileEncodingError {\n        /// ファイルパス\n        path: PathBuf,\n        /// 無効なバイト位置\n        byte_position: Option\u003cusize\u003e,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// 構文解析エラー\n    #[error(\"Parse error at line {line}, column {column}: {message}\")]\n    ParseError {\n        /// エラーが発生した行番号（1ベース）\n        line: u32,\n        /// エラーが発生した列番号（1ベース）\n        column: u32,\n        /// エラーメッセージ\n        message: String,\n        /// ソースコード範囲\n        source_range: Option\u003cSourceRange\u003e,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// tree-sitter解析エラー\n    #[error(\"Tree-sitter parsing failed: {reason}\")]\n    TreeSitterError {\n        /// エラー理由\n        reason: String,\n        /// 失敗した位置\n        position: Option\u003cPosition\u003e,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// クエリ実行エラー\n    #[error(\"Query execution failed: {query_name} - {reason}\")]\n    QueryExecutionError {\n        /// クエリ名\n        query_name: String,\n        /// エラー理由\n        reason: String,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// 無効な翻訳キーエラー\n    #[error(\"Invalid translation key: '{key}' at line {line}, column {column} - {reason}\")]\n    InvalidTranslationKey {\n        /// 無効な翻訳キー\n        key: String,\n        /// エラーが発生した行番号（1ベース）\n        line: u32,\n        /// エラーが発生した列番号（1ベース）\n        column: u32,\n        /// 無効である理由\n        reason: String,\n        /// ソースコード範囲\n        source_range: Option\u003cSourceRange\u003e,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// 翻訳が見つからないエラー\n    #[error(\"Missing translation for key: '{key}' in namespace: '{namespace:?}'\")]\n    MissingTranslation {\n        /// 見つからない翻訳キー\n        key: String,\n        /// 名前空間\n        namespace: Option\u003cString\u003e,\n        /// 検索されたロケール\n        locale: Option\u003cString\u003e,\n        /// 使用位置\n        usage_location: Option\u003cPosition\u003e,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// 重複する翻訳キーエラー\n    #[error(\"Duplicate translation key: '{key}' found in multiple locations\")]\n    DuplicateTranslationKey {\n        /// 重複する翻訳キー\n        key: String,\n        /// 最初の定義位置\n        first_location: Option\u003cPosition\u003e,\n        /// 重複した定義位置\n        duplicate_location: Option\u003cPosition\u003e,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// 無効な名前空間エラー\n    #[error(\"Invalid namespace: '{namespace}' at line {line}, column {column} - {reason}\")]\n    InvalidNamespace {\n        /// 無効な名前空間\n        namespace: String,\n        /// エラーが発生した行番号（1ベース）\n        line: u32,\n        /// エラーが発生した列番号（1ベース）\n        column: u32,\n        /// 無効である理由\n        reason: String,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// 翻訳リソースエラー\n    #[error(\"Translation resource error: {resource_path:?} - {reason}\")]\n    TranslationResourceError {\n        /// リソースファイルパス\n        resource_path: PathBuf,\n        /// エラー理由\n        reason: String,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// メモリ使用量制限超過エラー\n    #[error(\"Memory limit exceeded: {current_usage} bytes exceeds limit of {limit} bytes\")]\n    MemoryLimitExceeded {\n        /// 現在のメモリ使用量（バイト）\n        current_usage: u64,\n        /// メモリ制限（バイト）\n        limit: u64,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// 処理タイムアウトエラー\n    #[error(\"Processing timeout: operation took longer than {timeout_ms}ms\")]\n    TimeoutError {\n        /// タイムアウト時間（ミリ秒）\n        timeout_ms: u64,\n        /// 実行中だった操作\n        operation: String,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n\n    /// 内部エラー\n    #[error(\"Internal error: {message}\")]\n    InternalError {\n        /// エラーメッセージ\n        message: String,\n        /// エラーコンテキスト\n        context: ErrorContext,\n    },\n}\n\nimpl AnalysisError {\n    /// `ParseErrorを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `line` - エラーが発生した行番号（1ベース）\n    /// * `column` - エラーが発生した列番号（1ベース）\n    /// * `message` - エラーメッセージ\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいParseError`\n    #[must_use]\n    pub fn parse_error(line: u32, column: u32, message: String) -\u003e Self {\n        Self::ParseError {\n            line,\n            column,\n            message,\n            source_range: None,\n            context: ErrorContext::new(\"parse_error\".to_string(), ErrorSeverity::Error),\n        }\n    }\n\n    /// `ParseErrorを詳細情報付きで作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `line` - エラーが発生した行番号（1ベース）\n    /// * `column` - エラーが発生した列番号（1ベース）\n    /// * `message` - エラーメッセージ\n    /// * `source_range` - ソースコード範囲\n    /// * `context` - エラーコンテキスト\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいParseError`\n    #[must_use]\n    pub const fn parse_error_with_context(\n        line: u32,\n        column: u32,\n        message: String,\n        source_range: Option\u003cSourceRange\u003e,\n        context: ErrorContext,\n    ) -\u003e Self {\n        Self::ParseError { line, column, message, source_range, context }\n    }\n\n    /// `InvalidTranslationKeyを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `key` - 無効な翻訳キー\n    /// * `line` - エラーが発生した行番号（1ベース）\n    /// * `column` - エラーが発生した列番号（1ベース）\n    /// * `reason` - 無効である理由\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいInvalidTranslationKey`\n    #[must_use]\n    pub fn invalid_translation_key(key: String, line: u32, column: u32, reason: String) -\u003e Self {\n        Self::InvalidTranslationKey {\n            key,\n            line,\n            column,\n            reason,\n            source_range: None,\n            context: ErrorContext::new(\"invalid_translation_key\".to_string(), ErrorSeverity::Error),\n        }\n    }\n\n    /// `FileTooLargeエラーを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `size` - ファイルサイズ（バイト）\n    /// * `limit` - サイズ制限（バイト）\n    /// * `path` - ファイルパス\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいFileTooLarge`\n    #[must_use]\n    pub fn file_too_large(size: u64, limit: u64, path: PathBuf) -\u003e Self {\n        Self::FileTooLarge {\n            size,\n            limit,\n            path,\n            context: ErrorContext::new(\"file_too_large\".to_string(), ErrorSeverity::Error),\n        }\n    }\n\n    /// `TreeSitterErrorを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `reason` - エラー理由\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいTreeSitterError`\n    #[must_use]\n    pub fn tree_sitter_error(reason: String) -\u003e Self {\n        Self::TreeSitterError {\n            reason,\n            position: None,\n            context: ErrorContext::new(\"tree_sitter_error\".to_string(), ErrorSeverity::Error),\n        }\n    }\n\n    /// `InternalErrorを作成します`\n    ///\n    /// # 引数\n    ///\n    /// * `message` - エラーメッセージ\n    ///\n    /// # 戻り値\n    ///\n    /// `新しいInternalError`\n    #[must_use]\n    pub fn internal_error(message: String) -\u003e Self {\n        Self::InternalError {\n            message,\n            context: ErrorContext::new(\"internal_error\".to_string(), ErrorSeverity::Fatal),\n        }\n    }\n\n    /// エラーの重要度を取得します\n    ///\n    /// # 戻り値\n    ///\n    /// エラーの重要度\n    #[must_use]\n    pub const fn severity(\u0026self) -\u003e ErrorSeverity {\n        match self {\n            Self::UnsupportedFileType { context, .. }\n            | Self::FileTooLarge { context, .. }\n            | Self::FileReadError { context, .. }\n            | Self::FileEncodingError { context, .. }\n            | Self::ParseError { context, .. }\n            | Self::TreeSitterError { context, .. }\n            | Self::QueryExecutionError { context, .. }\n            | Self::InvalidTranslationKey { context, .. }\n            | Self::MissingTranslation { context, .. }\n            | Self::DuplicateTranslationKey { context, .. }\n            | Self::InvalidNamespace { context, .. }\n            | Self::TranslationResourceError { context, .. }\n            | Self::MemoryLimitExceeded { context, .. }\n            | Self::TimeoutError { context, .. }\n            | Self::InternalError { context, .. } =\u003e context.severity,\n        }\n    }\n\n    /// エラーログを出力します\n    ///\n    /// エラー内容と重要度に応じて適切なログレベルで出力します。\n    pub fn log_error(\u0026self) {\n        match self.severity() {\n            ErrorSeverity::Fatal =\u003e {\n                event!(Level::ERROR, error = %self, \"Fatal error occurred\");\n            }\n            ErrorSeverity::Error =\u003e {\n                event!(Level::ERROR, error = %self, \"Error occurred\");\n            }\n            ErrorSeverity::Warning =\u003e {\n                event!(Level::WARN, error = %self, \"Warning occurred\");\n            }\n            ErrorSeverity::Info =\u003e {\n                event!(Level::INFO, error = %self, \"Info message\");\n            }\n        }\n    }\n\n    /// エラーが回復可能かどうかを判定します\n    ///\n    /// # 戻り値\n    ///\n    /// 回復可能な場合はtrue\n    #[must_use]\n    pub const fn is_recoverable(\u0026self) -\u003e bool {\n        !matches!(\n            self,\n            Self::InternalError { .. }\n                | Self::MemoryLimitExceeded { .. }\n                | Self::FileEncodingError { .. }\n        )\n    }\n\n    /// エラーが発生した位置を取得します\n    ///\n    /// # 戻り値\n    ///\n    /// エラー位置情報（存在する場合）\n    #[must_use]\n    pub const fn position(\u0026self) -\u003e Option\u003cPosition\u003e {\n        match self {\n            Self::ParseError { line, column, .. } | Self::InvalidTranslationKey { line, column, .. } | Self::InvalidNamespace { line, column, .. } =\u003e {\n                Some(Position::new(*line, *column, 0))\n            }\n            Self::TreeSitterError { position, .. } =\u003e *position,\n            Self::MissingTranslation { usage_location, .. } =\u003e *usage_location,\n            Self::DuplicateTranslationKey { first_location, .. } =\u003e *first_location,\n            _ =\u003e None,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_file_id_creation() {\n        let file_id = FileId::new(42);\n        assert_eq!(file_id.as_u32(), 42);\n    }\n\n    #[test]\n    fn test_translation_reference_creation() {\n        let reference = TranslationReference::new(\n            FileId::new(1),\n            10,\n            5,\n            \"test.key\".to_string(),\n            Some(\"common\".to_string()),\n            \"t\".to_string(),\n        );\n\n        assert_eq!(reference.file_id, FileId::new(1));\n        assert_eq!(reference.line, 10);\n        assert_eq!(reference.column, 5);\n        assert_eq!(reference.key, \"test.key\");\n        assert_eq!(reference.namespace, Some(\"common\".to_string()));\n        assert_eq!(reference.function_name, \"t\");\n    }\n\n    #[test]\n    fn test_scope_info_contains_line() {\n        let scope = ScopeInfo::new(FileId::new(1), 5, 15);\n\n        assert!(!scope.contains_line(4));\n        assert!(scope.contains_line(5));\n        assert!(scope.contains_line(10));\n        assert!(scope.contains_line(15));\n        assert!(!scope.contains_line(16));\n    }\n\n    #[test]\n    fn test_file_type_from_path() {\n        let js_path = PathBuf::from(\"test.js\");\n        let ts_path = PathBuf::from(\"test.ts\");\n        let jsx_path = PathBuf::from(\"test.jsx\");\n        let tsx_path = PathBuf::from(\"test.tsx\");\n        let unknown_path = PathBuf::from(\"test.py\");\n\n        assert_eq!(FileType::from_path(\u0026js_path).expect(\"js file type\"), FileType::JavaScript);\n        assert_eq!(FileType::from_path(\u0026ts_path).expect(\"ts file type\"), FileType::TypeScript);\n        assert_eq!(\n            FileType::from_path(\u0026jsx_path).expect(\"jsx file type\"),\n            FileType::JavaScriptReact\n        );\n        assert_eq!(\n            FileType::from_path(\u0026tsx_path).expect(\"tsx file type\"),\n            FileType::TypeScriptReact\n        );\n\n        assert!(FileType::from_path(\u0026unknown_path).is_err());\n    }\n\n    #[test]\n    fn test_file_type_predicates() {\n        assert!(!FileType::JavaScript.is_typescript());\n        assert!(FileType::TypeScript.is_typescript());\n        assert!(!FileType::JavaScriptReact.is_typescript());\n        assert!(FileType::TypeScriptReact.is_typescript());\n\n        assert!(!FileType::JavaScript.is_react());\n        assert!(!FileType::TypeScript.is_react());\n        assert!(FileType::JavaScriptReact.is_react());\n        assert!(FileType::TypeScriptReact.is_react());\n    }\n\n    #[test]\n    fn test_analysis_result_operations() {\n        let mut result = AnalysisResult::new(FileId::new(1));\n\n        assert!(!result.has_errors());\n\n        result.add_error(AnalysisError::internal_error(\"Test error\".to_string()));\n        assert!(result.has_errors());\n\n        let reference = TranslationReference::new(\n            FileId::new(1),\n            5,\n            10,\n            \"test.key\".to_string(),\n            None,\n            \"t\".to_string(),\n        );\n        result.add_reference(reference);\n\n        assert_eq!(result.references.len(), 1);\n    }\n\n    #[test]\n    fn test_position_creation() {\n        let position = Position::new(10, 5, 100);\n        assert_eq!(position.line, 10);\n        assert_eq!(position.column, 5);\n        assert_eq!(position.byte_offset, 100);\n        assert_eq!(position.to_string(), \"10:5\");\n    }\n\n    #[test]\n    fn test_source_range_creation() {\n        let start = Position::new(10, 5, 100);\n        let end = Position::new(10, 15, 110);\n        let range = SourceRange::new(start, end);\n\n        assert_eq!(range.start, start);\n        assert_eq!(range.end, end);\n        assert_eq!(range.to_string(), \"10:5-10:15\");\n\n        let single_range = SourceRange::from_position(start);\n        assert_eq!(single_range.start, start);\n        assert_eq!(single_range.end, start);\n        assert_eq!(single_range.to_string(), \"10:5\");\n    }\n\n    #[test]\n    fn test_error_context_creation() {\n        let context = ErrorContext::new(\"test_function\".to_string(), ErrorSeverity::Error);\n\n        assert_eq!(context.function_name, \"test_function\");\n        assert_eq!(context.severity, ErrorSeverity::Error);\n        assert!(context.file_id.is_none());\n\n        let context_with_file = context.with_file(FileId::new(1), PathBuf::from(\"test.js\"));\n\n        assert_eq!(context_with_file.file_id, Some(FileId::new(1)));\n        assert_eq!(context_with_file.file_path, Some(PathBuf::from(\"test.js\")));\n    }\n\n    #[test]\n    fn test_error_severity_display() {\n        assert_eq!(ErrorSeverity::Fatal.to_string(), \"FATAL\");\n        assert_eq!(ErrorSeverity::Error.to_string(), \"ERROR\");\n        assert_eq!(ErrorSeverity::Warning.to_string(), \"WARNING\");\n        assert_eq!(ErrorSeverity::Info.to_string(), \"INFO\");\n    }\n\n    #[test]\n    fn test_analysis_error_severity() {\n        let parse_error = AnalysisError::parse_error(10, 5, \"Syntax error\".to_string());\n        assert_eq!(parse_error.severity(), ErrorSeverity::Error);\n\n        let internal_error = AnalysisError::internal_error(\"System failure\".to_string());\n        assert_eq!(internal_error.severity(), ErrorSeverity::Fatal);\n    }\n\n    #[test]\n    fn test_analysis_error_recoverability() {\n        let parse_error = AnalysisError::parse_error(10, 5, \"Syntax error\".to_string());\n        assert!(parse_error.is_recoverable());\n\n        let internal_error = AnalysisError::internal_error(\"System failure\".to_string());\n        assert!(!internal_error.is_recoverable());\n\n        let file_too_large =\n            AnalysisError::file_too_large(1_000_000, 500_000, PathBuf::from(\"large.js\"));\n        assert!(file_too_large.is_recoverable());\n    }\n\n    #[test]\n    fn test_enhanced_error_creation() {\n        let error = AnalysisError::invalid_translation_key(\n            \"invalid..key\".to_string(),\n            10,\n            5,\n            \"Key contains consecutive dots\".to_string(),\n        );\n\n        match error {\n            AnalysisError::InvalidTranslationKey { key, line, column, reason, .. } =\u003e {\n                assert_eq!(key, \"invalid..key\");\n                assert_eq!(line, 10);\n                assert_eq!(column, 5);\n                assert_eq!(reason, \"Key contains consecutive dots\");\n            }\n            _ =\u003e assert!(false, \"Expected InvalidTranslationKey\"),\n        }\n    }\n}\n\n","traces":[{"line":61,"address":[],"length":0,"stats":{"Line":58}},{"line":62,"address":[],"length":0,"stats":{"Line":58}},{"line":71,"address":[],"length":0,"stats":{"Line":17}},{"line":72,"address":[],"length":0,"stats":{"Line":17}},{"line":122,"address":[],"length":0,"stats":{"Line":1136}},{"line":174,"address":[],"length":0,"stats":{"Line":622}},{"line":179,"address":[],"length":0,"stats":{"Line":622}},{"line":190,"address":[],"length":0,"stats":{"Line":859}},{"line":191,"address":[],"length":0,"stats":{"Line":859}},{"line":204,"address":[],"length":0,"stats":{"Line":28842}},{"line":205,"address":[],"length":0,"stats":{"Line":42341}},{"line":243,"address":[],"length":0,"stats":{"Line":47}},{"line":244,"address":[],"length":0,"stats":{"Line":47}},{"line":252,"address":[],"length":0,"stats":{"Line":1135}},{"line":253,"address":[],"length":0,"stats":{"Line":1135}},{"line":261,"address":[],"length":0,"stats":{"Line":619}},{"line":262,"address":[],"length":0,"stats":{"Line":619}},{"line":270,"address":[],"length":0,"stats":{"Line":166}},{"line":271,"address":[],"length":0,"stats":{"Line":166}},{"line":280,"address":[],"length":0,"stats":{"Line":19}},{"line":281,"address":[],"length":0,"stats":{"Line":19}},{"line":322,"address":[],"length":0,"stats":{"Line":58}},{"line":323,"address":[],"length":0,"stats":{"Line":174}},{"line":324,"address":[],"length":0,"stats":{"Line":91}},{"line":325,"address":[],"length":0,"stats":{"Line":36}},{"line":326,"address":[],"length":0,"stats":{"Line":19}},{"line":327,"address":[],"length":0,"stats":{"Line":14}},{"line":328,"address":[],"length":0,"stats":{"Line":4}},{"line":329,"address":[],"length":0,"stats":{"Line":4}},{"line":330,"address":[],"length":0,"stats":{"Line":4}},{"line":331,"address":[],"length":0,"stats":{"Line":4}},{"line":333
